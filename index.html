<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【擊殺鬼王】大富翁</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" :class="{ 'modal-open': anyModalOpen }">

  <!-- ══ SPLASH ══ -->
  <div v-if="screen === 'splash'" class="splash-wrap">

    <!-- 劇場版 floating label (upper-left of circle) -->
    <div style="position:relative;z-index:3;font-size:0.65em;font-weight:700;letter-spacing:0.18em;color:rgba(245,215,140,0.85);margin-bottom:0.35em;font-family:'Noto Sans TC',sans-serif">
      劇場版
    </div>

    <!-- SVG brushstroke circle + title -->
    <div class="splash-circle">

      <!-- SVG: white bg + red ink brushstroke ring -->
      <svg viewBox="0 0 220 220"
           style="position:absolute;inset:0;width:100%;height:100%;overflow:visible"
           aria-hidden="true">
        <defs>
          <filter id="ink-brush" x="-12%" y="-12%" width="124%" height="124%">
            <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="4" seed="7" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5.5"
                               xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <!-- warm white/cream interior -->
        <circle cx="110" cy="110" r="96" fill="#faf2e4"/>
        <!-- main red brushstroke -->
        <circle cx="110" cy="110" r="96"
                fill="none" stroke="#b51812" stroke-width="22"
                stroke-linecap="round"
                filter="url(#ink-brush)"
                transform="rotate(-10 110 110)"/>
        <!-- second pass — darker overlap for depth -->
        <circle cx="110" cy="110" r="96"
                fill="none" stroke="rgba(140,12,6,0.5)" stroke-width="10"
                stroke-linecap="round"
                stroke-dasharray="200 430"
                filter="url(#ink-brush)"
                transform="rotate(80 110 110)"/>
      </svg>

      <!-- text content inside circle -->
      <div class="splash-circle-text">
        <!-- main title — Shippori Mincho B1, BLACK on white -->
        <div style="font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:3.5em;line-height:0.86;letter-spacing:0.06em;color:#111">堅持夏趣</div>
        <!-- red subtitle — same font -->
        <div style="font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:0.88em;line-height:1.35;letter-spacing:0.08em;margin-top:0.28em;color:#b51812">2026 無限城篇</div>
      </div>
    </div>

    <!-- buttons -->
    <div class="flex flex-col items-center" style="margin-top:1.3em;gap:0.45em;position:relative;z-index:3">
      <button @click="startGame" class="btn btn-red"
              style="font-size:0.72em;padding:0.55em 3.2em;letter-spacing:0.18em">
        開始遊戲
      </button>
      <button v-if="hasSavedGame" @click="restoreAutoSave"
              class="btn btn-ghost"
              style="font-size:0.58em;padding:0.4em 2.2em;letter-spacing:0.1em">
        ↩ 繼續上次遊戲
      </button>
    </div>

    <!-- team roster — avatar strip -->
    <div class="flex items-end gap-4" style="margin-top:1.4em;position:relative;z-index:3">
      <div v-for="(team, idx) in teams" :key="team.id"
           class="flex flex-col items-center" style="gap:0.28em">
        <img :src="team.avatar"
             style="width:1.9em;height:1.9em;border-radius:50%;object-fit:cover"
             :style="{outline:'1.5px solid '+team.color,outlineOffset:'1px',opacity:0.8}"
             onerror="this.style.display='none'">
        <span style="font-size:0.65em;letter-spacing:0.03em;white-space:nowrap"
              :style="{color:team.color,opacity:0.65}">{{ team.name }}</span>
      </div>
    </div>

    <!-- copyright -->
    <div style="position:absolute;bottom:0.8em;font-size:0.65em;letter-spacing:0.1em;color:rgba(220,185,110,0.2);z-index:2">
      © 新生教會主日學 2026
    </div>
  </div>

  <!-- ══ VERSION SELECT ══ -->
  <div v-else-if="screen === 'versionSelect'"
       class="flex flex-col items-center justify-center h-full w-full"
       style="background:rgba(7,5,10,0.98);gap:1.8em">
    <div class="font-display text-cream" style="font-size:0.7em;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,106,26,0.7)">Select Version</div>
    <div class="font-display text-cream" style="font-size:1.8em;letter-spacing:0.1em">選擇版本</div>

    <div class="flex" style="gap:2em;margin-top:0.5em">
      <!-- 新生教會 card -->
      <div @click="selectVersion('xinsheng')"
           class="flex flex-col items-center"
           style="cursor:pointer;padding:1.6em 2.4em;background:rgba(255,106,26,0.06);border:1px solid rgba(255,106,26,0.3);border-radius:2px;gap:0.6em;transition:background 0.15s,border-color 0.15s;min-width:9em"
           onmouseover="this.style.background='rgba(255,106,26,0.14)';this.style.borderColor='rgba(255,106,26,0.7)'"
           onmouseout="this.style.background='rgba(255,106,26,0.06)';this.style.borderColor='rgba(255,106,26,0.3)'">
        <div class="font-display text-accent" style="font-size:1.6em;letter-spacing:0.08em">新生教會</div>
        <div style="height:1px;width:100%;background:rgba(255,106,26,0.3)"></div>
        <div class="text-muted" style="font-size:0.65em;letter-spacing:0.1em">6 隊 · 16 格</div>
      </div>

      <!-- 大內教會 card -->
      <div @click="selectVersion('danei')"
           class="flex flex-col items-center"
           style="cursor:pointer;padding:1.6em 2.4em;background:rgba(255,106,26,0.06);border:1px solid rgba(255,106,26,0.3);border-radius:2px;gap:0.6em;transition:background 0.15s,border-color 0.15s;min-width:9em"
           onmouseover="this.style.background='rgba(255,106,26,0.14)';this.style.borderColor='rgba(255,106,26,0.7)'"
           onmouseout="this.style.background='rgba(255,106,26,0.06)';this.style.borderColor='rgba(255,106,26,0.3)'">
        <div class="font-display text-accent" style="font-size:1.6em;letter-spacing:0.08em">大內教會</div>
        <div style="height:1px;width:100%;background:rgba(255,106,26,0.3)"></div>
        <div class="text-muted" style="font-size:0.65em;letter-spacing:0.1em">4 隊 · 12 格</div>
      </div>
    </div>

    <button @click="screen='splash'" class="btn btn-ghost" style="font-size:0.65em;padding:0.4em 1.8em;letter-spacing:0.1em;margin-top:0.5em">← 返回</button>
  </div>

  <!-- ══ FINAL STRIKE ══ -->
  <div v-else-if="screen === 'finalStrike'" class="fs-victory-wrap">
    <!-- Entry flash -->
    <div class="fs-flash"></div>
    <!-- Sunburst rotating rays -->
    <div class="fs-sunburst"></div>
    <!-- Central glow -->
    <div class="fs-burst"></div>
    <!-- Expanding light rings -->
    <div class="fs-ring" style="animation-duration:2.8s;animation-delay:0.0s"></div>
    <div class="fs-ring" style="animation-duration:2.8s;animation-delay:0.5s"></div>
    <div class="fs-ring" style="animation-duration:2.8s;animation-delay:1.0s"></div>
    <!-- Sword slash lines -->
    <div class="fs-slash-line fs-slash-line-1"></div>
    <div class="fs-slash-line fs-slash-line-2"></div>
    <!-- Confetti particles (24 pieces) -->
    <div class="fs-particle" style="left:3%;width:7px;height:11px;background:#ffcc40;animation-duration:3.2s;animation-delay:0.0s"></div>
    <div class="fs-particle" style="left:8%;width:4px;height:9px;background:#ff6818;animation-duration:4.1s;animation-delay:0.3s"></div>
    <div class="fs-particle" style="left:14%;width:9px;height:6px;background:#fff5ec;animation-duration:3.6s;animation-delay:0.7s"></div>
    <div class="fs-particle" style="left:20%;width:5px;height:10px;background:#ffd060;animation-duration:2.9s;animation-delay:1.1s"></div>
    <div class="fs-particle" style="left:27%;width:7px;height:5px;background:#ff8820;animation-duration:3.8s;animation-delay:0.2s"></div>
    <div class="fs-particle" style="left:34%;width:4px;height:11px;background:#ffcc40;animation-duration:4.3s;animation-delay:0.6s"></div>
    <div class="fs-particle" style="left:41%;width:10px;height:6px;background:#fff5ec;animation-duration:3.1s;animation-delay:1.4s"></div>
    <div class="fs-particle" style="left:48%;width:5px;height:9px;background:#ffd060;animation-duration:3.7s;animation-delay:0.8s"></div>
    <div class="fs-particle" style="left:54%;width:6px;height:8px;background:#ff6818;animation-duration:2.8s;animation-delay:0.4s"></div>
    <div class="fs-particle" style="left:60%;width:4px;height:10px;background:#ffcc40;animation-duration:4.0s;animation-delay:1.0s"></div>
    <div class="fs-particle" style="left:67%;width:9px;height:5px;background:#fff5ec;animation-duration:3.4s;animation-delay:0.6s"></div>
    <div class="fs-particle" style="left:73%;width:5px;height:9px;background:#ffd060;animation-duration:3.9s;animation-delay:1.3s"></div>
    <div class="fs-particle" style="left:79%;width:7px;height:7px;background:#ff8820;animation-duration:2.7s;animation-delay:0.5s"></div>
    <div class="fs-particle" style="left:85%;width:4px;height:11px;background:#ffcc40;animation-duration:4.4s;animation-delay:1.0s"></div>
    <div class="fs-particle" style="left:91%;width:8px;height:6px;background:#fff5ec;animation-duration:3.3s;animation-delay:0.8s"></div>
    <div class="fs-particle" style="left:96%;width:5px;height:9px;background:#ff6818;animation-duration:4.0s;animation-delay:1.5s"></div>
    <div class="fs-particle" style="left:11%;width:6px;height:8px;background:#ffd060;animation-duration:3.5s;animation-delay:1.9s"></div>
    <div class="fs-particle" style="left:38%;width:5px;height:9px;background:#ff8820;animation-duration:4.6s;animation-delay:2.1s"></div>
    <div class="fs-particle" style="left:57%;width:8px;height:6px;background:#ffcc40;animation-duration:3.2s;animation-delay:1.7s"></div>
    <div class="fs-particle" style="left:72%;width:4px;height:10px;background:#fff5ec;animation-duration:3.8s;animation-delay:2.3s"></div>
    <div class="fs-particle" style="left:87%;width:7px;height:7px;background:#ffd060;animation-duration:3.0s;animation-delay:1.6s"></div>
    <div class="fs-particle" style="left:23%;width:5px;height:8px;background:#ff6818;animation-duration:4.2s;animation-delay:2.6s"></div>
    <div class="fs-particle" style="left:50%;width:6px;height:7px;background:#ffcc40;animation-duration:3.6s;animation-delay:2.8s"></div>
    <div class="fs-particle" style="left:65%;width:4px;height:11px;background:#fff5ec;animation-duration:4.1s;animation-delay:3.0s"></div>
    <!-- Main content -->
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center">
      <!-- CLEAR emblem -->
      <div class="fs-clear-emblem">
        <div class="fs-clear-orn">
          <div class="fs-clear-orn-line"></div>
          <span class="fs-clear-orn-gem">◆</span>
          <div class="fs-clear-orn-line" style="background:linear-gradient(to left,transparent,rgba(255,200,70,0.85),transparent)"></div>
        </div>
        <div class="fs-clear-text">CLEAR</div>
        <div class="fs-clear-orn">
          <div class="fs-clear-orn-line"></div>
          <span class="fs-clear-orn-gem">◆</span>
          <div class="fs-clear-orn-line" style="background:linear-gradient(to left,transparent,rgba(255,200,70,0.85),transparent)"></div>
        </div>
      </div>
      <!-- Main title -->
      <div class="fs-title">鬼殺隊　勝利！</div>
      <!-- Subtitle -->
      <div class="fs-battle-sub">
        <div class="fs-battle-sub-line"></div>
        <div class="fs-battle-sub-text">鬼王無慘　討伐完成</div>
        <div class="fs-battle-sub-line r"></div>
      </div>
      <!-- Stage label -->
      <div class="fs-stage-label">Final Battle · Mission Complete</div>
      <!-- Button -->
      <button @click="screen='victory'; startVictoryReveal()" class="btn-gold">查看戰果</button>
    </div>
  </div>

  <!-- ══ VICTORY ══ -->
  <div v-else-if="screen === 'victory'" class="flex h-full w-full" style="padding:3em 5em;gap:4.5em;align-items:center">
    <div style="flex:0 0 auto">
      <div style="font-size:0.65em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(208,120,32,0.5);margin-bottom:0.4em">Victory</div>
      <div class="font-display text-accent" style="font-size:4.8em;line-height:0.88;margin-bottom:0.2em">戰績<br>揭曉</div>
      <div style="width:2.5em;height:1.5px;background:linear-gradient(to right,#f09028,transparent);margin-top:0.6em;opacity:0.7"></div>
    </div>
    <div style="flex:1;border-left:1px solid rgba(255,106,26,0.3);padding-left:2.5em">
      <div class="section-label">最終排名</div>
      <div style="display:grid;grid-template-columns:2em 2.2em 1fr auto auto auto;gap:0 0.8em;align-items:center;font-size:0.65em;letter-spacing:0.08em;text-transform:uppercase;color:rgba(208,120,32,0.4);padding:0 0 0.5em 0;margin-bottom:0.3em">
        <span></span><span></span><span></span>
        <span>傷害</span><span>步數</span><span style="width:3em;text-align:right"></span>
      </div>
      <div v-for="(team, idx) in rankedTeams" :key="team.id"
           class="rank-entry"
           :style="{
             opacity: victoryRevealStep >= (rankedTeams.length - idx) ? 1 : 0,
             transform: victoryRevealStep >= (rankedTeams.length - idx) ? 'translateY(0)' : 'translateY(1em)'
           }">
        <div class="flex items-center gap-3"
             style="padding:0.55em 0;border-bottom:1px solid rgba(255,106,26,0.18)">
          <span class="font-display text-dim" style="font-size:0.9em;width:2em;flex-shrink:0">0{{ idx+1 }}</span>
          <img :src="team.avatar"
               style="width:2.4em;height:2.4em;border-radius:50%;object-fit:cover;flex-shrink:0"
               :style="{outline:'2px solid '+team.color,outlineOffset:'2px'}"
               onerror="this.style.display='none'">
          <span class="text-cream" style="font-size:1.05em;font-weight:500;flex:1">{{ team.name }}</span>
          <span class="font-display" style="font-size:1.4em;width:2em;text-align:right" :style="{color:team.color}">{{ team.damageDealt }}</span>
          <span class="font-display" style="font-size:1.4em;width:2em;text-align:right;color:rgba(208,120,32,0.7)">{{ team.totalSteps||0 }}</span>
          <span style="font-size:0.6em;letter-spacing:0.08em;width:3em;text-align:right">
            <span v-if="idx===0" style="color:rgba(208,120,32,0.7)">最強</span>
            <span v-if="team.id===mostTraveledId" style="color:rgba(90,184,138,0.8)">最遠</span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ BOSS VICTORY ══ -->
  <div v-else-if="screen === 'bossVictory'" class="flex flex-col items-center justify-center h-full w-full">
    <div style="font-size:0.65em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,106,26,0.78);margin-bottom:0.7em">Game Over</div>
    <div class="font-display text-accent" style="font-size:5.2em;line-height:0.88;margin-bottom:0.2em">鬼王<br>勝利</div>
    <div class="text-muted" style="font-size:0.68em;margin-top:0.6em">所有隊伍已被消滅</div>
  </div>

  <!-- ══ MAIN GAME ══ -->
  <template v-else-if="screen === 'game'">

    <!-- TOP BAR -->
    <div class="flex items-center gap-3 flex-shrink-0"
         style="height:7%;min-height:0;padding:0 1.2em;background:#0d0b11;border-bottom:1px solid rgba(255,106,26,0.28)">
      <div class="font-display text-cream" style="font-size:1.1em;letter-spacing:0.05em;flex-shrink:0">擊殺鬼王大富翁</div>
      <!-- ticker -->
      <div class="ticker-wrap" style="flex:1">
        <div class="ticker-inner">
          KILL THE DEMON KING &nbsp;⸺&nbsp; 擊殺鬼王 &nbsp;⸺&nbsp; SLAYERS UNITE &nbsp;⸺&nbsp; 鬼殺隊集結 &nbsp;⸺&nbsp; ROUND {{ globalRound }} &nbsp;⸺&nbsp; DEMON HP {{ ghostKingHP }} &nbsp;⸺&nbsp; KILL THE DEMON KING &nbsp;⸺&nbsp; 擊殺鬼王 &nbsp;⸺&nbsp; SLAYERS UNITE &nbsp;⸺&nbsp; 鬼殺隊集結 &nbsp;⸺&nbsp; ROUND {{ globalRound }} &nbsp;⸺&nbsp; DEMON HP {{ ghostKingHP }} &nbsp;⸺&nbsp;
        </div>
      </div>
      <div class="text-muted" style="font-size:0.65em;letter-spacing:0.14em;text-transform:uppercase;flex-shrink:0">
        RND <span class="font-display text-cream" style="font-size:1.35em">{{ globalRound }}</span>
      </div>
      <span v-if="autoSaveMsg" style="font-size:0.65em;color:rgba(208,120,32,0.5);letter-spacing:0.08em;flex-shrink:0">{{ autoSaveMsg }}</span>
      <div class="flex gap-2" style="flex-shrink:0">
        <button @click="undoLastAction" :disabled="!lastSnapshot" class="btn btn-ghost" style="font-size:0.65em;padding:0.3em 0.8em">↩ 上一步</button>
        <button @click="showSaveModal=true" class="btn btn-ghost" style="font-size:0.65em;padding:0.3em 0.8em">存檔</button>
        <button @click="screen='victory'; startVictoryReveal()" class="btn btn-ghost" style="font-size:0.65em;padding:0.3em 0.8em;color:rgba(255,106,26,0.7);border-color:rgba(255,106,26,0.3)">結束結算</button>
      </div>
    </div>

    <!-- 3-COLUMN -->
    <div class="flex flex-1 overflow-hidden">

      <!-- ── LEFT ── -->
      <div class="flex flex-col"
           style="width:22%;background:#0d0b11;border-right:1px solid rgba(255,106,26,0.28)">

        <!-- Boss row -->
        <div class="flex items-center flex-shrink-0"
             style="padding:0.65em 0.8em;gap:0.65em;transition:background 0.2s;border-bottom:1px solid rgba(255,106,26,0.3)"
             :style="{background:currentTurnType==='boss'?'rgba(255,106,26,0.18)':'transparent',
                      borderLeft:currentTurnType==='boss'?'2.5px solid #ff6818':'2.5px solid transparent'}">
          <img :src="MUZAN_AVATAR"
               style="width:2.6em;height:2.6em;border-radius:50%;object-fit:cover;flex-shrink:0;opacity:0.9;outline:1.5px solid #ff6818;outline-offset:2px"
               onerror="this.style.display='none'">
          <div style="flex:1;min-width:0">
            <div class="boss-hud-label">Demon King</div>
            <div style="font-size:0.78em;font-weight:700;color:#e8908a;letter-spacing:0.04em">鬼王無慘</div>
            <div class="boss-hud-bar">
              <div class="boss-hud-bar-fill hp-bar-inner"
                   :style="{width:Math.max(0,ghostKingHP/(version==='danei'?56:80)*100)+'%'}"></div>
            </div>
            <div style="margin-top:0.28em;display:flex;align-items:center;justify-content:space-between">
              <div style="display:flex;gap:0.35em;flex-wrap:wrap">
                <span v-if="bossStatus.nextAttackMultiplier>1" style="font-size:0.65em;color:#ff8840;background:rgba(255,106,26,0.12);border:1px solid rgba(255,106,26,0.35);padding:0.1em 0.4em;border-radius:1px">夜晚×{{ bossStatus.nextAttackMultiplier }}</span>
                <span v-if="bossStatus.isBossTurnSkip"   style="font-size:0.65em;color:#f0c040;background:rgba(208,160,0,0.1);border:1px solid rgba(208,160,0,0.3);padding:0.1em 0.4em;border-radius:1px">白天</span>
                <span v-if="bossStatus.sealedMovement"   style="font-size:0.65em;color:#5ab88a;background:rgba(90,184,138,0.1);border:1px solid rgba(90,184,138,0.3);padding:0.1em 0.4em;border-radius:1px">封印</span>
                <span v-if="bossStatus.targetHighest"    style="font-size:0.65em;color:#c080e8;background:rgba(180,80,200,0.1);border:1px solid rgba(180,80,200,0.3);padding:0.1em 0.4em;border-radius:1px">黑死牟</span>
              </div>
              <span style="font-size:0.65em;color:rgba(224,92,24,0.45);letter-spacing:0.04em">/ {{ version==='danei'?56:80 }}</span>
            </div>
          </div>
          <div style="flex-shrink:0;text-align:right;padding-left:0.4em">
            <div class="hp-num-boss" :class="ghostKingHP<=10?'hp-num-low':''">{{ ghostKingHP }}</div>
            <div style="font-size:0.65em;color:rgba(224,92,24,0.32);letter-spacing:0.1em;margin-top:0.1em;text-transform:uppercase">HP</div>
          </div>
        </div>

        <!-- Team rows -->
        <div class="flex flex-col overflow-y-auto log-container" style="flex:1">
          <div v-for="(team,idx) in teams" :key="team.id"
               :class="[flashingTeams[team.id]?'team-row-hit':'']"
               style="display:flex;align-items:center;gap:0.65em;padding:0.6em 0.8em;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.18s,border-left-color 0.18s"
               :style="{
                 background: currentTurnType==='player'&&teams[currentTeamIndex]&&teams[currentTeamIndex].id===team.id&&team.hp>0 ? 'rgba(255,255,255,0.055)' : 'transparent',
                 borderLeft: currentTurnType==='player'&&teams[currentTeamIndex]&&teams[currentTeamIndex].id===team.id&&team.hp>0 ? '2.5px solid '+team.color : '2.5px solid transparent',
                 opacity: team.hp<=0 ? 0.32 : 1
               }">
            <img :src="team.avatar"
                 :class="{
                   'avatar-glow-shield': team.status.shieldActive && !team.status.doubleDamage,
                   'avatar-glow-double': team.status.doubleDamage && !team.status.shieldActive,
                   'avatar-glow-both':   team.status.shieldActive && team.status.doubleDamage
                 }"
                 style="width:2.6em;height:2.6em;border-radius:50%;object-fit:cover;flex-shrink:0;display:block"
                 :style="{outline:'1.5px solid '+(team.hp>0?team.color:'#2a1a14'),outlineOffset:'2px'}"
                 onerror="this.style.display='none'">
            <div style="flex:1;min-width:0">
              <div style="font-size:0.74em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                   :style="{color:team.hp>0?'#e0d4c0':'#7a6050'}">{{ team.name }}</div>
              <div class="team-hud-bar">
                <div class="team-hud-bar-fill hp-bar-inner"
                     :style="{width:Math.max(0,team.hp/12*100)+'%', background:team.hp>0?team.color:'#3a2a24'}"></div>
              </div>
              <div style="display:flex;align-items:center;gap:0.28em;margin-top:0.15em;flex-wrap:nowrap">
                <span v-if="team.status.shieldActive" class="team-badge team-badge-shield">盾</span>
                <span v-if="team.status.doubleDamage" class="team-badge team-badge-double">×2</span>
                <span v-if="team.status.breathEnhanced" class="team-badge team-badge-breath">呼</span>
                <span v-if="team.status.revengeBlade" class="team-badge team-badge-revenge">刃</span>
                <span style="font-size:0.65em;color:rgba(208,120,32,0.35);margin-left:auto">{{ team.damageDealt }}dmg</span>
              </div>
            </div>
            <div style="flex-shrink:0;text-align:right;padding-left:0.3em">
              <div class="font-display" style="font-size:1.15em;line-height:1;transition:color 0.3s"
                   :style="{color:team.hp<=0?'#3a2a24':team.hp<=3?'#ff5030':team.color}">{{ team.hp }}</div>
              <div style="font-size:0.3em;color:rgba(224,212,192,0.18);letter-spacing:0.1em;margin-top:0.1em;text-transform:uppercase">HP</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── CENTER ── -->
      <div class="flex flex-col items-center justify-center"
           style="width:56%;padding:0.4em;background:#080502">
        <div style="width:100%;aspect-ratio:1/1;max-height:100%;position:relative">
          <div class="board-grid" :style="'height:100%;width:100%;grid-template-columns:repeat('+boardSize+',1fr);grid-template-rows:repeat('+boardSize+',1fr)'">

            <template v-for="row in boardSize" :key="'r'+row">
              <template v-for="col in boardSize" :key="'r'+row+'c'+col">

                <!-- control panel -->
                <div v-if="row===2&&col===2" class="control-panel panel-glow" :style="[controlPanelGridStyle, {'--panel-glow': currentTurnType === 'boss' ? 'rgba(255,104,24,0.6)' : (currentPhase==='team-judge'&&judgeQueue[judgeTeamIndex] ? judgeQueue[judgeTeamIndex].color : (teams[rollTeamIndex] ? teams[rollTeamIndex].color : '#fff5ec'))}]">

                  <div class="text-center" style="margin-bottom:0.5em;position:relative;z-index:1">
                    <img v-if="currentTurnType==='boss'" :src="MUZAN_AVATAR" :style="'width:'+(['big-game-results','team-judge','countdown'].indexOf(currentPhase)>=0?'2em':'3em')+';height:'+(['big-game-results','team-judge','countdown'].indexOf(currentPhase)>=0?'2em':'3em')+';border-radius:50%;object-fit:cover;margin:0 auto 0.3em auto;display:block'" onerror="this.style.display='none'">
                    <img v-else-if="currentPhase==='team-judge'&&judgeQueue[judgeTeamIndex]" :src="judgeQueue[judgeTeamIndex].avatar" style="width:2em;height:2em;border-radius:50%;object-fit:cover;margin:0 auto 0.3em auto;display:block" onerror="this.style.display='none'">
                    <img v-else-if="currentPhase==='big-game-results'||currentPhase==='countdown'" style="display:none">
                    <img v-else-if="teams[rollTeamIndex]" :src="teams[rollTeamIndex].avatar" style="width:3em;height:3em;border-radius:50%;object-fit:cover;margin:0 auto 0.4em auto;display:block" onerror="this.style.display='none'">
                    <div class="hud-phase-label">{{ phaseLabel || 'Stand By' }}</div>
                    <div v-if="currentPhase==='group-roll'&&teams[rollTeamIndex]"
                         class="font-display" style="font-size:2em;line-height:1;letter-spacing:0.04em;text-shadow:0 0 20px currentColor"
                         :style="{color:teams[rollTeamIndex].color}">
                      {{ teams[rollTeamIndex].name }}
                    </div>
                    <div v-else-if="currentTurnType==='boss'" class="font-display text-accent" style="font-size:2em;line-height:1;text-shadow:0 0 20px rgba(255,106,26,0.6)">鬼王無慘</div>
                    <div v-else class="font-display text-cream" style="font-size:1.15em;line-height:1;letter-spacing:0.08em">
                      {{ {'big-game':'大 遊 戲','big-game-results':'大遊戲結算'}[currentPhase]||'' }}
                    </div>
                    <div v-if="nextTurnInfo" class="text-dim"
                         style="margin-top:0.45em;padding-top:0.3em;border-top:1px solid rgba(255,106,26,0.18);font-size:0.65em;letter-spacing:0.08em">
                      NEXT → <span style="font-weight:600" :style="{color:nextTurnInfo.color}">{{ nextTurnInfo.name }}</span>
                    </div>
                  </div>

                  <!-- GROUP ROLL -->
                  <div v-if="currentPhase==='group-roll'&&currentTurnType==='player'"
                       style="width:100%;position:relative;z-index:1">
                    <div class="action-label">⚔ 選擇骰子點數</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.25em">
                      <button v-for="n in 6" :key="n" @click="groupRoll(n)"
                              :disabled="isAnimating"
                              class="dice-btn dice-btn-player"
                              style="font-size:1.15em;padding:0.42em 0;font-family:'Bebas Neue',sans-serif">{{ n }}</button>
                    </div>
                  </div>


                  <!-- COUNTDOWN -->
                  <div v-else-if="currentPhase==='countdown'"
                       style="width:100%;display:flex;flex-direction:column;align-items:center;gap:0.5em;position:relative;z-index:1">
                    <div style="font-size:0.65em;letter-spacing:0.14em;color:rgba(208,120,32,0.5)">任務倒數計時</div>
                    <div class="font-display text-accent" style="font-size:3.8em;line-height:1;letter-spacing:0.04em">{{ countdownDisplay }}</div>
                    <div class="timer-bar" :class="{'timer-pulse': countdownPulse}">
                      <div class="timer-bar-fill"
                           :style="{width: countdownProgress + '%', background: countdownBarColor}">
                      </div>
                    </div>
                    <button v-if="!countdownRunning" @click="startMission" class="btn btn-action-primary w-full"
                            style="font-size:0.62em;padding:0.48em;letter-spacing:0.1em">▶ 開始計時</button>
                    <button @click="endCountdown" class="btn w-full"
                            style="font-size:0.62em;padding:0.48em;border-color:rgba(255,106,26,0.3);color:rgba(255,106,26,0.55);letter-spacing:0.08em">時間到，開始結算</button>
                  </div>

                  <!-- TEAM JUDGE -->
                  <div v-else-if="currentPhase==='team-judge'"
                       style="width:100%;display:flex;flex-direction:column;gap:0.28em;position:relative;z-index:1">
                    <div class="text-center" style="font-size:0.65em;color:rgba(180,140,80,0.5);letter-spacing:0.1em;margin-bottom:0.05em">
                      {{ judgeTeamIndex+1 }} / {{ judgeQueue.length }} 隊
                    </div>
                    <div v-if="judgeQueue[judgeTeamIndex]" class="text-center font-display"
                         style="font-size:0.65em;letter-spacing:0.06em"
                         :style="{color:judgeQueue[judgeTeamIndex].color}">
                      {{ judgeQueue[judgeTeamIndex].name }}
                    </div>
                    <template v-if="!judgeWaitingRoll">
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.3em;margin-top:0.15em">
                        <button @click="judgePass" class="btn btn-judge-pass">✓ 任務成功</button>
                        <button @click="judgeFail" class="btn btn-judge-fail">✗ 任務失敗</button>
                      </div>
                    </template>
                    <template v-else>
                      <div class="action-label" style="color:rgba(80,200,130,0.65)">⚔ 過關！選攻擊骰</div>
                      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.25em">
                        <button v-for="n in 6" :key="n" @click="judgeRoll(n)" :disabled="showDmgOverlay"
                                class="dice-btn dice-btn-player"
                                style="font-size:1.15em;padding:0.42em 0;font-family:'Bebas Neue',sans-serif">{{ n }}</button>
                      </div>
                    </template>
                  </div>

                  <!-- BIG GAME -->
                  <div v-else-if="currentPhase==='big-game'"
                       style="width:100%;display:flex;flex-direction:column;align-items:center;gap:0.4em;position:relative;z-index:1">
                    <div class="font-display text-cream text-center" style="font-size:0.75em;letter-spacing:0.06em">大遊戲時間！</div>
                    <div class="text-center" style="font-size:0.65em;color:#b8a888;line-height:1.5">進行大遊戲<br>結束後記錄各隊勝負</div>
                    <button @click="startBigGameResults" class="btn btn-action-primary w-full"
                            style="font-size:0.66em;padding:0.5em;margin-top:0.3em;letter-spacing:0.1em">記錄大遊戲結果 →</button>
                  </div>

                  <!-- BIG GAME RESULTS -->
                  <div v-else-if="currentPhase==='big-game-results'"
                       style="width:100%;display:flex;flex-direction:column;gap:0.2em;position:relative;z-index:1">
                    <div class="text-center" style="font-size:0.65em;margin-bottom:0.1em;color:#f09028;letter-spacing:0.06em">大遊戲 — 哪幾隊贏？</div>
                    <div v-for="r in bigGameResults" :key="r.teamId"
                         style="display:flex;align-items:center;gap:0.3em">
                      <span style="font-size:0.65em;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" :style="{color:r.color}">{{ r.name }}</span>
                      <button @click="toggleBigGameResult(r.teamId)" class="btn"
                              :style="r.won?'font-size:0.65em;padding:0.22em 0.7em;background:rgba(90,184,138,0.18);border-color:rgba(90,184,138,0.7);color:#5ab88a':'font-size:0.65em;padding:0.22em 0.7em;border-color:rgba(255,106,26,0.2);color:rgba(255,106,26,0.3)'">
                        {{ r.won ? '贏 ✓' : '贏？' }}
                      </button>
                    </div>
                    <div class="text-center" style="font-size:0.65em;color:#6a5a50;margin-top:0.2em">
                      {{ bigGameResults.filter(function(r){return r.won}).length }} 隊獲勝 → 鬼王扣 {{ bigGameResults.filter(function(r){return r.won}).length }} HP
                    </div>
                    <button @click="applyBigGameResults" class="btn w-full"
                            style="font-size:0.66em;padding:0.45em;margin-top:0.2em;border-color:rgba(255,106,26,0.78);color:#ff6818">結算 →</button>
                  </div>

                  <!-- BOSS ROLL -->
                  <div v-else-if="currentPhase==='boss-roll'"
                       style="width:100%;position:relative;z-index:1">
                    <div class="action-label" style="color:rgba(255,80,40,0.55)">☠ 鬼王移動</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.25em">
                      <button v-for="n in 6" :key="n" @click="bossRoll(n)" :disabled="isAnimating"
                              class="dice-btn dice-btn-boss"
                              style="font-size:1.15em;padding:0.42em 0;font-family:'Bebas Neue',sans-serif">{{ n }}</button>
                    </div>
                  </div>

                  <!-- BOSS ATTACK -->
                  <div v-else-if="currentPhase==='boss-attack'"
                       style="width:100%;position:relative;z-index:1">
                    <div class="action-label" style="color:rgba(255,60,30,0.6)">☠ 鬼王攻擊</div>
                    <div class="text-center" style="font-size:0.65em;margin-bottom:0.3em;color:rgba(255,120,60,0.7);letter-spacing:0.06em">
                      目標：{{ bossTargets.map(function(t){return t.name}).join(' / ') }}
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.25em">
                      <button v-for="n in 6" :key="n" @click="bossAttack(n)"
                              class="dice-btn dice-btn-boss"
                              style="font-size:1.15em;padding:0.42em 0;font-family:'Bebas Neue',sans-serif">{{ n }}</button>
                    </div>
                  </div>

                  <!-- BOSS NEXT -->
                  <div v-else-if="currentPhase==='boss-next'"
                       style="width:100%;position:relative;z-index:1">
                    <button @click="endBossTurn" class="btn btn-action-primary w-full" style="font-size:0.72em;padding:0.55em;letter-spacing:0.12em">下一回合 →</button>
                  </div>

                </div>

                <!-- skip interior -->
                <div v-else-if="row>=2&&row<=boardSize-1&&col>=2&&col<=boardSize-1" style="display:none"></div>

                <!-- board cell -->
                <div v-else
                     class="board-cell"
                     :class="[cellClass(row,col), squareAt(row,col)&&flashingCells[squareAt(row,col).id]?'cell-hit':'']">
                  <template v-if="squareAt(row,col)">
                    <!-- floating damage numbers -->
                    <div v-for="dmg in floatingDamages.filter(function(d){return squareAt(row,col)&&d.squareId===squareAt(row,col).id;})"
                         :key="dmg.id" class="floating-dmg">-{{ dmg.damage }}</div>

                    <!-- cell identity: icon + label -->
                    <div class="cell-identity">
                      <div class="cell-sq-num">{{ squareAt(row,col).id }}</div>

                      <!-- Start -->
                      <div v-if="squareAt(row,col).type==='start'" class="cell-sq-icon" style="color:#f0c040">★</div>
                      <!-- Chance (鎹鴉傳令) -->
                      <div v-else-if="squareAt(row,col).type==='card'" class="cell-sq-icon" style="color:#ffc840">鴉</div>
                      <!-- Fate (命運試煉) -->
                      <div v-else-if="squareAt(row,col).type==='fate'" class="cell-sq-icon" style="color:#b870f0">月</div>
                      <!-- Task — sword icon -->
                      <div v-else class="cell-sq-icon" style="font-size:0.9em">⚔️</div>

                    </div>

                    <!-- tokens -->
                    <div class="token-row" style="position:relative;z-index:1">
                      <template v-for="team in teams" :key="team.id">
                        <div v-if="teamDisplayPos(team)===squareAt(row,col).id&&team.hp>0"
                             class="token-avatar"
                             :class="{'token-hop': hoppingTeam===team.id}"
                             :style="{outline:'2px solid '+team.color,outlineOffset:'1px'}">
                          <img :src="team.avatar" onerror="this.style.display='none'">
                        </div>
                      </template>
                      <div v-if="bossDisplayPos===squareAt(row,col).id"
                           class="token-avatar"
                           :class="{'token-hop':hoppingBoss}"
                           style="outline:2px solid #ff6818;outline-offset:1px">
                        <img :src="MUZAN_AVATAR" onerror="this.style.display='none'">
                      </div>
                    </div>
                  </template>
                </div>

              </template>
            </template>
          </div>
        </div>
      </div>

      <!-- ── RIGHT ── -->
      <div class="flex flex-col"
           style="width:22%;background:#0d0b11;border-left:1px solid rgba(255,106,26,0.28)">
        <div class="flex-1 overflow-y-auto log-container" style="padding:0.5em 0.5em 0.5em 0.6em">
          <div class="section-label">事件日誌</div>
          <div v-for="(entry,idx) in gameLog" :key="idx"
               style="font-size:0.85em;padding:0.22em 0.4em;margin-bottom:0.08em;border-radius:1px;border-left:2px solid transparent;transition:border-color 0.2s"
               :style="{borderLeftColor: entry.type==='success'?'rgba(80,200,130,0.5)':entry.type==='damage'||entry.type==='fail'?'rgba(255,90,50,0.45)':entry.type==='heal'?'rgba(80,200,140,0.4)':entry.type==='shield'?'rgba(80,150,220,0.4)':entry.type==='card'?'rgba(160,90,210,0.4)':'rgba(255,106,26,0.18)'}">
            <span style="color:rgba(100,70,50,0.6);margin-right:0.3em;font-size:0.85em">{{ entry.time }}</span>
            <span :class="{'log-success':entry.type==='success','log-fail':entry.type==='fail','log-damage':entry.type==='damage','log-system':entry.type==='system','log-shield':entry.type==='shield','log-heal':entry.type==='heal','log-card':entry.type==='card'}">{{ entry.msg }}</span>
          </div>
        </div>
      </div>
    </div>


    <!-- SAVE/LOAD MODAL -->
    <div v-if="showSaveModal" class="modal-overlay" @click.self="showSaveModal=false">
      <div style="padding:1.4em;width:min(90%,380px);background:#120f18;border:1px solid rgba(255,106,26,0.48);box-shadow:0 8px 48px rgba(0,0,0,0.6)">
        <div class="font-display text-cream" style="font-size:1em;margin-bottom:0.7em;letter-spacing:0.05em">💾 存檔 / 讀檔</div>
        <textarea v-model="saveJsonStr"
                  class="w-full font-mono resize-none"
                  style="height:10em;font-size:0.6em;padding:0.5em;margin-bottom:0.5em;background:#0a0810;color:#5ab88a;border:1px solid rgba(255,106,26,0.4);outline:none;border-radius:2px"
                  placeholder="存檔 JSON 會顯示在這裡..."></textarea>
        <div class="flex gap-2">
          <button @click="generateSave" class="btn btn-ghost flex-1" style="font-size:0.7em;padding:0.5em">產生存檔</button>
          <button @click="loadSave" class="btn flex-1" style="font-size:0.7em;padding:0.5em;border-color:rgba(90,184,138,0.3);color:#5ab88a">讀取存檔</button>
          <button @click="showSaveModal=false" class="btn btn-ghost" style="font-size:0.7em;padding:0.4em 0.8em">✕</button>
        </div>
      </div>
    </div>

    <!-- REVIVE MODAL -->
    <div v-if="showReviveModal" class="modal-overlay">
      <div style="padding:1.4em;min-width:200px;background:#120f18;border:1px solid rgba(255,106,26,0.48);box-shadow:0 8px 48px rgba(0,0,0,0.6)">
        <div class="font-display text-cream" style="font-size:1em;margin-bottom:0.8em;letter-spacing:0.05em">死者甦醒：選擇復活隊伍</div>
        <div class="flex flex-col gap-2">
          <button v-for="team in deadTeams" :key="team.id" @click="reviveTeam(team.id)"
                  class="btn btn-ghost flex items-center gap-3"
                  style="padding:0.5em 0.8em;font-size:0.82em;width:100%">
            <div class="rounded-full flex-shrink-0" style="width:0.7em;height:0.7em" :style="{background:team.color}"></div>
            <span class="font-semibold">{{ team.name }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ══ CARD REVEAL MODAL ══ -->
    <div v-if="showCardModal" class="card-overlay" @click="closeCardModal">
      <div class="card-modal" :class="cardModalData&&cardModalData.isChance?'chance':'fate'" @click.stop>
        <div class="crow-corner crow-corner-tl"></div>
        <div class="crow-corner crow-corner-tr"></div>
        <div class="crow-corner crow-corner-bl"></div>
        <div class="crow-corner crow-corner-br"></div>
        <div class="card-modal-icon">{{ cardModalData&&cardModalData.isChance?'✨':'⚠️' }}</div>
        <div class="card-modal-type"
             :style="cardModalData&&cardModalData.isChance?'color:rgba(90,184,138,0.7)':'color:rgba(255,106,26,0.95)'">
          {{ cardModalData&&cardModalData.type }}
        </div>
        <div class="card-modal-name"
             :style="cardModalData&&cardModalData.isChance?'color:#5ab88a':'color:#e8908a'">
          {{ cardModalData&&cardModalData.name }}
        </div>
        <div class="card-modal-divider"
             :style="cardModalData&&cardModalData.isChance?'background:linear-gradient(to right,transparent,rgba(90,184,138,0.45),transparent)':'background:linear-gradient(to right,transparent,rgba(255,106,26,0.82),transparent)'">
        </div>
        <div class="card-modal-effect">{{ cardModalData&&cardModalData.effect }}</div>
        <div class="card-modal-dismiss">點擊任意處繼續</div>
      </div>
    </div>

    <!-- ══ CROW MESSENGER MODAL — 鎹烏送信 ══ -->
    <div v-if="showCrowModal" class="crow-overlay" @click="closeCrowModal">
      <div class="crow-modal" @click.stop>
        <div class="crow-corner crow-corner-tl"></div>
        <div class="crow-corner crow-corner-tr"></div>
        <div class="crow-corner crow-corner-bl"></div>
        <div class="crow-corner crow-corner-br"></div>
        <div class="crow-seal">任務</div>

        <div class="crow-figure" aria-hidden="true">
          <svg width="130" height="86" viewBox="0 0 140 92" fill="none" xmlns="http://www.w3.org/2000/svg">

            <path d="M114 28 L130 24 L116 34 Z" fill="#1c1c1c"/>
            <circle cx="109" cy="26" r="4" class="crow-eye-glow" fill="#ff6818"/>
            <circle cx="110" cy="25" r="1.5" class="crow-eyeshine" fill="#e87060"/>
            <path d="M72 48 C52 26 26 10 4 15 C22 30 48 42 66 52 Z" fill="#111"/>
            <path d="M72 48 C55 30 34 18 14 22 C30 34 52 44 68 52 Z" fill="#161616"/>

            <path d="M46 56 L20 72 L32 59 L10 65 L36 54 L16 47 L42 52 Z" fill="#0d0d0d"/>
            <path d="M72 48 L48 35 M72 48 L38 26 M72 48 L28 19" stroke="#252525" stroke-width="0.8" opacity="0.7"/>
            <path d="M82 48 L104 35 M82 48 L112 26 M82 48 L122 19" stroke="#252525" stroke-width="0.8" opacity="0.7"/>
            <rect x="58" y="65" width="12" height="9" rx="1" fill="#c8a97a" opacity="0.7"/>
            <line x1="60" y1="68" x2="68" y2="68" stroke="#a08050" stroke-width="0.8" opacity="0.6"/>
            <line x1="60" y1="70" x2="68" y2="70" stroke="#a08050" stroke-width="0.8" opacity="0.5"/>
          </svg>
        </div>

        <span class="crow-tagline">— 鎹烏送信 · Mission Dispatched —</span>
        <div class="crow-mission-name" v-if="crowMission">{{ crowMission.name }}</div>
        <div class="crow-hr"></div>
        <div v-if="crowMission" style="min-height:3em;display:flex;align-items:center;justify-content:center">
          <div v-if="!showCrowDesc"
               @click.stop="showCrowDesc=true"
               style="cursor:pointer;font-size:0.78em;color:rgba(255,106,26,0.95);border:1px solid rgba(255,106,26,0.58);border-radius:4px;padding:0.3em 1em;letter-spacing:0.06em;transition:color 0.15s,border-color 0.15s"
               onmouseover="this.style.color='rgba(224,92,24,1)';this.style.borderColor='rgba(255,106,26,0.92)'"
               onmouseout="this.style.color='rgba(255,106,26,0.95)';this.style.borderColor='rgba(255,106,26,0.58)'">
            查看任務說明 ▾
          </div>
          <div v-else class="crow-mission-desc" style="animation:none">{{ crowMission.desc }}</div>
        </div>
        <span class="crow-dismiss">點擊任意處繼續</span>
      </div>
    </div>

    <!-- ══ TEAM HIT OVERLAY ══ -->
    <div v-if="showTeamHitOverlay" class="team-hit-overlay">
      <div class="team-hit-banner">
        <div class="team-hit-label">鬼王無慘攻擊</div>
        <div class="team-hit-number">-{{ teamHitDmg }}</div>
        <div class="team-hit-rows">
          <div v-for="r in teamHitResults" :key="r.id" class="team-hit-row">
            <div class="team-hit-dot" :style="{background:r.color}"></div>
            <span :style="{color:r.color}">{{ r.name }}</span>
            <span style="color:rgba(245,237,224,0.45);font-size:0.85em">剩 {{ r.hp }} HP{{ r.dead ? '　已陣亡' : '' }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ DAMAGE STRIKE OVERLAY ══ -->
    <div v-if="showDmgOverlay" class="dmg-overlay">
      <div class="dmg-banner">
        <div class="dmg-number">-{{ dmgOverlayDmg }}</div>
        <div class="dmg-slash-line"></div>
        <div class="dmg-team">{{ dmgOverlayTeam }}</div>
        <div class="dmg-hp-remain">鬼王剩餘 {{ dmgOverlayHP }} HP</div>
      </div>
    </div>

    <!-- ══ 産屋敷降臨 ══ -->
    <div v-if="showUbuyashikiOverlay" class="ubuyashiki-overlay" :class="{'fade-out':ubuyashikiFadingOut}">
      <div class="ub-glow"></div>
      <div class="ub-label">御館様降臨</div>
      <div class="ub-name">産屋敷 耀哉</div>
      <div class="ub-desc">御館様の加護により、鬼殺隊は再び立ち上がる</div>
      <div class="ub-revive">全隊伍復活　HP 回復至 3</div>
    </div>

    <div v-if="showTurnTransition" class="turn-transition-overlay">
      <div class="turn-transition-banner">
        <div style="font-size:0.65em;letter-spacing:0.24em;text-transform:uppercase;color:rgba(208,120,32,0.55);margin-bottom:0.4em">
          {{ turnTransitionIsBoss ? 'Boss Turn' : 'Player Turn' }}
        </div>
        <div class="font-display" style="font-size:3.2em;line-height:1;letter-spacing:0.06em"
             :style="{color:turnTransitionColor}">{{ turnTransitionName }}</div>
        <div style="font-size:0.65em;letter-spacing:0.18em;color:rgba(224,212,192,0.25);margin-top:0.5em">の 回 合</div>
      </div>
    </div>

  </template>
</div>

<script src="js/data.js"></script>
<script src="js/game-logic.js"></script>
<script src="js/app.js"></script>
</body>
</html>
