<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【擊殺鬼王】大富翁</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #07050a;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: 'Noto Sans TC', system-ui, sans-serif;
}
#app {
  width: min(100vw, 177.78vh);
  height: min(100vh, 56.25vw);
  font-size: min(1.8vw, 3.2vh);
  position: relative;
  background: #07050a;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  color: #e0d4c0;
}
/* subtle cross-grid texture — like Japanese textile */
#app::before {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(194,59,43,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(194,59,43,0.022) 1px, transparent 1px);
  background-size: 22px 22px;
}
#app > * { position: relative; z-index: 1; }

/* ── typography ── */
.font-display { font-family: 'Bebas Neue', system-ui, sans-serif; letter-spacing: 0.03em; }
.text-cream  { color: #e0d4c0; }
.text-dim    { color: #5a4a40; }
.text-muted  { color: #8a7868; }
.text-accent { color: #c23b2b; }
.text-gold   { color: #b89040; }

/* ── pulse for slash ── */
@keyframes pulse-opacity {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
.slash-text { animation: pulse-opacity 1.4s ease-in-out infinite; color: #c23b2b; }

/* ── board — Infinity Castle warm palette ── */
.board-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  width: 100%; height: 100%;
  gap: 2px;
  background: #020100; /* wooden beam gaps */
}
.board-cell {
  position: relative; overflow: hidden; min-height: 0;
  background: #100c07;
  border: 1px solid rgba(200,110,40,0.16);
}
/* subtle lantern glow in each cell */
.board-cell::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 65% 75%, rgba(210,120,40,0.05) 0%, transparent 55%);
}

/* ── control panel ── */
.control-panel {
  grid-column: 2 / 5;
  grid-row: 2 / 5;
  background: #150f08;
  border: 1px solid rgba(200,110,40,0.18);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0.6em; overflow: hidden; position: relative;
}
.control-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
  background: linear-gradient(to right, transparent, #c87828 40%, #c87828 60%, transparent);
  opacity: 0.5;
}
.control-panel::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, rgba(200,110,40,0.05) 0%, transparent 55%);
}

/* ── tokens ── */
.token-row { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; justify-content: center; }
.token-avatar {
  width: 1.45em; height: 1.45em;
  border-radius: 50%; overflow: hidden; flex-shrink: 0;
  box-shadow: 0 1px 5px rgba(0,0,0,0.7);
  transition: transform 0.15s ease-out;
}
.token-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
@keyframes token-hop {
  0%   { transform: scale(1)     translateY(0); }
  40%  { transform: scale(1.15)  translateY(-0.25em); }
  100% { transform: scale(1)     translateY(0); }
}
.token-hop { animation: token-hop 0.22s ease-out; }

/* ── bars ── */
.hp-bar-inner { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

/* ── scrollbar ── */
.log-container { scrollbar-width: thin; scrollbar-color: #2a1a14 #0d0b11; }
.log-container::-webkit-scrollbar { width: 3px; }
.log-container::-webkit-scrollbar-track { background: #0d0b11; }
.log-container::-webkit-scrollbar-thumb { background: #2a1a14; }

/* ── section label — gold editorial ── */
.section-label {
  font-size: 0.42em; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(184,144,64,0.45); font-weight: 500;
  margin-bottom: 0.5em; padding-bottom: 0.38em;
  border-bottom: 1px solid rgba(194,59,43,0.1);
}

/* ── announcement card ── */
.announcement-card {
  background: transparent; border: none;
  border-top: 1px solid rgba(194,59,43,0.1);
  padding: 0.7em;
}

/* ── modal ── */
.modal-overlay {
  position: absolute !important; inset: 0;
  background: rgba(3,1,6,0.92); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}

/* ── buttons ── */
.btn {
  font-family: 'Noto Sans TC', system-ui, sans-serif; font-weight: 700;
  cursor: pointer; border-radius: 2px; outline: none;
  letter-spacing: 0.06em;
  border: 1px solid rgba(194,59,43,0.22);
  background: rgba(194,59,43,0.06);
  color: #e0d4c0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn:hover { background: #c23b2b; color: #fff; border-color: #c23b2b; }
.btn-red  { background: #c23b2b; border-color: #c23b2b; color: #fff; }
.btn-red:hover { background: #a02f22; border-color: #a02f22; }
.btn-ghost { background: transparent; border-color: rgba(224,212,192,0.1); color: #8a7868; }
.btn-ghost:hover { background: rgba(224,212,192,0.06); color: #e0d4c0; border-color: rgba(224,212,192,0.18); }
.btn:disabled, .btn[disabled] { opacity: 0.2; cursor: not-allowed; }

/* ── dice ── */
.dice-btn {
  font-family: 'Bebas Neue', sans-serif; font-size: 1em;
  padding: 0.3em 0; letter-spacing: 0.05em; cursor: pointer;
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  border: 1px solid rgba(224,212,192,0.07);
}
.dice-btn:hover { background: #c23b2b !important; color: #fff !important; border-color: #c23b2b !important; }
.dice-btn-player { background: rgba(224,212,192,0.04); color: #e0d4c0; }
.dice-btn-boss   { background: rgba(194,59,43,0.1); color: #e8908a; border-color: rgba(194,59,43,0.2); }

/* ── ticker ── */
@keyframes ticker-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-wrap {
  flex: 1; overflow: hidden;
  mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
}
.ticker-inner {
  display: inline-block; white-space: nowrap;
  animation: ticker-scroll 28s linear infinite;
  font-size: 0.42em; letter-spacing: 0.14em;
  color: rgba(194,59,43,0.18); text-transform: uppercase;
  font-family: 'Bebas Neue', sans-serif;
}

/* ── board cell flavours ── */
.cell-trace        { background: #100c07; }
.cell-trace-red    {
  /* START — stronger lantern glow, gold frame */
  background: radial-gradient(ellipse at 50% 55%, rgba(220,150,50,0.14) 0%, transparent 65%), #120e08;
  border-color: rgba(210,150,50,0.28) !important;
}
.cell-trace-purple {
  /* CARD — cooler amber-purple */
  background: radial-gradient(ellipse at 50% 50%, rgba(160,80,180,0.08) 0%, transparent 65%), #100b0e;
  border-color: rgba(150,70,180,0.14) !important;
}

/* ══ SPLASH SCREEN — Infinity Castle movie poster ══ */
.splash-wrap {
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; width: 100%;
  /* Warm amber architectural atmosphere */
  background-image: url('assets/splash-bg.png');
  background-size: cover;
  background-position: center center;
}

/* ink circle wrapper */
.splash-circle {
  position: relative; z-index: 2;
  width: 20em; height: 20em;
  flex-shrink: 0;
  animation: splash-in 0.7s cubic-bezier(0.2,0.8,0.3,1) 0.15s both;
  /* outer red glow */
  filter: drop-shadow(0 0 2.5em rgba(180,25,8,0.55)) drop-shadow(0 0 6em rgba(150,15,5,0.25));
}
.splash-circle-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.4em 1.6em; text-align: center;
}

@keyframes splash-in {
  from { opacity:0; transform:scale(0.9); }
  to   { opacity:1; transform:scale(1); }
}

/* ── Tailwind overrides for dark bg ── */
.text-red-400    { color: #e86050 !important; }
.text-green-400  { color: #5ab88a !important; }
.text-yellow-400 { color: #c8a040 !important; }
.text-yellow-300 { color: #c8a040 !important; }
.text-teal-400   { color: #4ab0a0 !important; }
.text-cyan-400   { color: #5090c8 !important; }
.text-orange-400 { color: #d07040 !important; }
.text-slate-400  { color: #7a6a60 !important; }
.text-slate-500  { color: #5a4a42 !important; }
.text-slate-300  { color: #a09080 !important; }
.text-purple-300 { color: #9878c8 !important; }
.text-white      { color: #e0d4c0 !important; }

/* ══════════════════════════════════════════
   CROW MESSENGER MODAL — 鎹烏送信
══════════════════════════════════════════ */
@keyframes crow-overlay-in  { from { opacity:0 } to { opacity:1 } }
@keyframes crow-modal-in {
  from { transform: translateY(-2.5em) scale(0.96); opacity:0 }
  to   { transform: translateY(0) scale(1); opacity:1 }
}
@keyframes crow-fly-in {
  0%   { transform: translate(40%,-60%) rotate(-20deg) scale(0.5); opacity:0 }
  65%  { transform: translate(0,0) rotate(3deg) scale(1.06); opacity:1 }
  100% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1 }
}
@keyframes crow-eye-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes seal-stamp {
  from { transform:rotate(12deg) scale(1.8); opacity:0 }
  to   { transform:rotate(12deg) scale(1); opacity:1 }
}
@keyframes text-reveal {
  from { opacity:0; transform:translateY(0.4em) }
  to   { opacity:1; transform:translateY(0) }
}
@keyframes divider-grow {
  from { width:0; opacity:0 }
  to   { width:50%; opacity:1 }
}
.crow-overlay {
  position:absolute !important; inset:0;
  background:rgba(4,2,6,0.92); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  z-index:200; cursor:pointer;
  animation:crow-overlay-in 0.35s ease-out;
}
.crow-modal {
  position:relative; width:min(88%,600px);
  background:
    radial-gradient(ellipse at 50% 0%, rgba(194,59,43,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, rgba(80,30,80,0.06) 0%, transparent 50%),
    linear-gradient(170deg,#100c14 0%,#0d080e 50%,#08080f 100%);
  border:1px solid rgba(194,59,43,0.14);
  padding:1.8em 2.2em 1.4em;
  text-align:center; cursor:default; overflow:hidden;
  animation:crow-modal-in 0.45s cubic-bezier(0.2,0.8,0.3,1) 0.1s both;
}
.crow-modal::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(194,59,43,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(194,59,43,0.025) 1px, transparent 1px);
  background-size:18px 18px;
}
.crow-modal::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,#c23b2b,transparent); opacity:0.5;
}
.crow-corner {
  position:absolute; width:1.2em; height:1.2em;
  border-color:rgba(194,59,43,0.3); border-style:solid;
}
.crow-corner-tl { top:0.5em; left:0.5em; border-width:1px 0 0 1px; }
.crow-corner-tr { top:0.5em; right:0.5em; border-width:1px 1px 0 0; }
.crow-corner-bl { bottom:0.5em; left:0.5em; border-width:0 0 1px 1px; }
.crow-corner-br { bottom:0.5em; right:0.5em; border-width:0 1px 1px 0; }
.crow-seal {
  position:absolute; top:0.9em; right:0.9em;
  font-family:'Bebas Neue',sans-serif; font-size:0.5em;
  color:rgba(194,59,43,0.5); border:1.5px solid rgba(194,59,43,0.3);
  width:2.4em; height:2.4em;
  display:flex; align-items:center; justify-content:center;
  letter-spacing:0.04em; line-height:1; transform:rotate(12deg);
  animation:seal-stamp 0.3s ease-out 1.2s both;
}
.crow-figure {
  display:flex; justify-content:center; margin-bottom:0.6em;
  animation:crow-fly-in 0.6s cubic-bezier(0.2,0.8,0.3,1) 0.25s both;
}
.crow-eye-glow { animation:crow-eye-pulse 1.8s ease-in-out infinite; }
.crow-eyeshine { animation:crow-eye-pulse 1.8s ease-in-out 0.3s infinite; }
.crow-tagline {
  font-family:'Bebas Neue',sans-serif; font-size:0.44em; letter-spacing:0.28em;
  color:rgba(194,59,43,0.55); text-transform:uppercase; display:block;
  animation:text-reveal 0.4s ease-out 0.7s both;
}
.crow-mission-name {
  font-family:'Bebas Neue',sans-serif; font-size:1.4em; letter-spacing:0.1em; line-height:1.2;
  color:#f5ede0; margin:0.18em 0 0.25em;
  white-space: normal; word-break: keep-all;
  animation:text-reveal 0.4s ease-out 0.85s both;
}
.crow-hr {
  height:1px; width:0;
  background:linear-gradient(to right,transparent,rgba(194,59,43,0.45),transparent);
  margin:0 auto 0.7em;
  animation:divider-grow 0.5s ease-out 1s both;
}
.crow-mission-desc {
  font-size:0.7em; line-height:1.65; color:rgba(245,237,224,0.58); letter-spacing:0.03em;
  animation:text-reveal 0.4s ease-out 1.05s both;
}
.crow-damage-badge {
  display:inline-block; margin-top:0.75em;
  font-family:'Bebas Neue',sans-serif; font-size:0.6em; color:#c23b2b; letter-spacing:0.1em;
  border:1px solid rgba(194,59,43,0.28); padding:0.12em 0.9em;
  animation:text-reveal 0.4s ease-out 1.15s both;
}
.crow-dismiss {
  display:block; margin-top:1.1em; font-size:0.44em; letter-spacing:0.14em;
  color:rgba(245,237,224,0.25); text-transform:uppercase;
  animation:text-reveal 0.4s ease-out 1.35s both;
}

/* ══ CARD REVEAL MODAL ══ */
.card-overlay {
  position:absolute !important; inset:0;
  background:rgba(4,2,6,0.92); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  z-index:200; cursor:pointer;
  animation:crow-overlay-in 0.3s ease-out;
}
.card-modal {
  position:relative; width:min(58%,360px);
  padding:1.8em 2.4em 1.4em; text-align:center;
  cursor:default; overflow:hidden;
  animation:crow-modal-in 0.4s cubic-bezier(0.2,0.8,0.3,1) 0.05s both;
}
.card-modal::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--card-accent-grad); opacity:0.55;
}
.card-modal-icon {
  font-size:2em; margin-bottom:0.2em;
  animation:text-reveal 0.3s ease-out 0.2s both;
}
.card-modal-type {
  font-size:0.4em; letter-spacing:0.22em; text-transform:uppercase;
  margin-bottom:0.3em;
  animation:text-reveal 0.3s ease-out 0.3s both;
}
.card-modal-name {
  font-family:'Shippori Mincho B1',serif; font-weight:800;
  font-size:1.6em; line-height:1; letter-spacing:0.06em;
  margin:0.15em 0 0.3em;
  animation:text-reveal 0.3s ease-out 0.45s both;
}
.card-modal-divider {
  height:1px; width:50%; margin:0 auto 0.65em;
  animation:divider-grow 0.4s ease-out 0.6s both;
}
.card-modal-effect {
  font-size:0.68em; line-height:1.6; color:rgba(245,237,224,0.55);
  animation:text-reveal 0.3s ease-out 0.75s both;
}
.card-modal-dismiss {
  display:block; margin-top:1em; font-size:0.42em; letter-spacing:0.14em;
  color:rgba(245,237,224,0.22); text-transform:uppercase;
  animation:text-reveal 0.3s ease-out 1s both;
}
/* chance = green, fate = red */
.card-modal.chance {
  --card-accent-grad: linear-gradient(to right,transparent,#5ab88a,transparent);
  background: radial-gradient(ellipse at 50% 0%, rgba(90,184,138,0.08) 0%, transparent 55%),
              linear-gradient(170deg,#090e0b 0%,#060c08 100%);
  border:1px solid rgba(90,184,138,0.2);
}
.card-modal.fate {
  --card-accent-grad: linear-gradient(to right,transparent,#c23b2b,transparent);
  background: radial-gradient(ellipse at 50% 0%, rgba(194,59,43,0.08) 0%, transparent 55%),
              linear-gradient(170deg,#120c0f 0%,#0e0809 100%);
  border:1px solid rgba(194,59,43,0.2);
}

/* ══ DAMAGE EFFECTS ══ */
@keyframes cell-hit-shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-4px); }
  40%     { transform:translateX(4px); }
  60%     { transform:translateX(-3px); }
  80%     { transform:translateX(2px); }
}
@keyframes cell-hit-flash {
  0%   { box-shadow:inset 0 0 0 100vw rgba(194,59,43,0.55); }
  100% { box-shadow:inset 0 0 0 100vw rgba(194,59,43,0); }
}
.cell-hit {
  animation: cell-hit-shake 0.4s ease-out, cell-hit-flash 0.6s ease-out;
}
@keyframes float-dmg {
  0%   { transform:translateX(-50%) translateY(0);      opacity:1; }
  100% { transform:translateX(-50%) translateY(-2.2em); opacity:0; }
}
.floating-dmg {
  position:absolute; left:50%; top:40%;
  transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif; font-size:1.1em;
  color:#ef4444; font-weight:700; white-space:nowrap;
  text-shadow:0 0 8px rgba(194,59,43,0.9);
  animation:float-dmg 0.9s ease-out forwards;
  pointer-events:none; z-index:10;
}

/* ══ C：回合過場 TURN TRANSITION ══ */
@keyframes turn-banner-show {
  0%   { opacity:0; transform:translateY(-0.6em) scale(0.96); }
  18%  { opacity:1; transform:translateY(0) scale(1); }
  80%  { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(0.3em) scale(0.98); }
}
.turn-transition-overlay {
  position:absolute !important; inset:0;
  background:rgba(4,2,8,0.78); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:300; pointer-events:none;
}
.turn-transition-banner {
  text-align:center;
  animation: turn-banner-show 1.4s cubic-bezier(0.2,0.8,0.3,1) forwards;
}

/* ══ D：翻牌動畫 CARD FLIP ══ */
@keyframes card-flip-select {
  0%   { transform:scaleX(1) scaleY(1); }
  35%  { transform:scaleX(0.04) scaleY(1.08); }
  65%  { transform:scaleX(0.04) scaleY(1.08); }
  100% { transform:scaleX(1) scaleY(1); }
}
.card-flipping-anim {
  animation: card-flip-select 0.42s ease-in-out forwards;
  pointer-events:none;
}

/* ══ 方案4：道具持有 avatar glow ══ */
@keyframes glow-shield {
  0%,100% { box-shadow:0 0 0.35em 0.1em rgba(80,144,200,0.45); }
  50%     { box-shadow:0 0 0.8em  0.3em rgba(80,144,200,0.8);  }
}
@keyframes glow-double {
  0%,100% { box-shadow:0 0 0.35em 0.1em rgba(208,112,64,0.5); }
  50%     { box-shadow:0 0 0.8em  0.3em rgba(208,112,64,0.85); }
}
@keyframes glow-both {
  0%  { box-shadow:0 0 0.7em 0.22em rgba(80,144,200,0.75); }
  50% { box-shadow:0 0 0.7em 0.22em rgba(208,112,64,0.75); }
  100%{ box-shadow:0 0 0.7em 0.22em rgba(80,144,200,0.75); }
}
.avatar-glow-shield { animation:glow-shield 1.6s ease-in-out infinite; }
.avatar-glow-double { animation:glow-double 1.4s ease-in-out infinite; }
.avatar-glow-both   { animation:glow-both   2s   ease-in-out infinite; }

/* ══ E：玩家受傷閃爍 TEAM ROW HIT ══ */
@keyframes team-row-flash {
  0%   { box-shadow:inset 0 0 0 100vw rgba(194,59,43,0.35); }
  100% { box-shadow:inset 0 0 0 100vw rgba(194,59,43,0); }
}
.team-row-hit { animation: team-row-flash 0.65s ease-out; }


</style>
</head>
<body>
<div id="app">

  <!-- ══ SPLASH ══ -->
  <div v-if="screen === 'splash'" class="splash-wrap">

    <!-- 劇場版 floating label (upper-left of circle) -->
    <div style="position:relative;z-index:3;font-size:0.55em;font-weight:700;letter-spacing:0.18em;color:rgba(245,215,140,0.85);margin-bottom:0.35em;font-family:'Noto Sans TC',sans-serif">
      劇場版
    </div>

    <!-- SVG brushstroke circle + title -->
    <div class="splash-circle">

      <!-- SVG: white bg + red ink brushstroke ring -->
      <svg viewBox="0 0 220 220"
           style="position:absolute;inset:0;width:100%;height:100%;overflow:visible"
           aria-hidden="true">
        <defs>
          <filter id="ink-brush" x="-12%" y="-12%" width="124%" height="124%">
            <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="4" seed="7" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5.5"
                               xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <!-- warm white/cream interior -->
        <circle cx="110" cy="110" r="96" fill="#faf2e4"/>
        <!-- main red brushstroke -->
        <circle cx="110" cy="110" r="96"
                fill="none" stroke="#b51812" stroke-width="22"
                stroke-linecap="round"
                filter="url(#ink-brush)"
                transform="rotate(-10 110 110)"/>
        <!-- second pass — darker overlap for depth -->
        <circle cx="110" cy="110" r="96"
                fill="none" stroke="rgba(140,12,6,0.5)" stroke-width="10"
                stroke-linecap="round"
                stroke-dasharray="200 430"
                filter="url(#ink-brush)"
                transform="rotate(80 110 110)"/>
      </svg>

      <!-- text content inside circle -->
      <div class="splash-circle-text">
        <!-- main title — Shippori Mincho B1, BLACK on white -->
        <div style="font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:3.5em;line-height:0.86;letter-spacing:0.06em;color:#111">堅持夏趣</div>
        <!-- red subtitle — same font -->
        <div style="font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:0.88em;line-height:1.35;letter-spacing:0.08em;margin-top:0.28em;color:#b51812">2026 無限城篇</div>
      </div>
    </div>

    <!-- buttons -->
    <div class="flex flex-col items-center" style="margin-top:1.3em;gap:0.45em;position:relative;z-index:3">
      <button @click="startGame" class="btn btn-red"
              style="font-size:0.72em;padding:0.55em 3.2em;letter-spacing:0.18em">
        開始遊戲
      </button>
      <button v-if="hasSavedGame" @click="restoreAutoSave"
              class="btn btn-ghost"
              style="font-size:0.58em;padding:0.4em 2.2em;letter-spacing:0.1em">
        ↩ 繼續上次遊戲
      </button>
    </div>

    <!-- team roster — avatar strip -->
    <div class="flex items-end gap-4" style="margin-top:1.4em;position:relative;z-index:3">
      <div v-for="(team, idx) in teams" :key="team.id"
           class="flex flex-col items-center" style="gap:0.28em">
        <img :src="team.avatar"
             style="width:1.9em;height:1.9em;border-radius:50%;object-fit:cover"
             :style="{outline:'1.5px solid '+team.color,outlineOffset:'1px',opacity:0.8}"
             onerror="this.style.display='none'">
        <span style="font-size:0.34em;letter-spacing:0.03em;white-space:nowrap"
              :style="{color:team.color,opacity:0.65}">{{ team.name }}</span>
      </div>
    </div>

    <!-- copyright -->
    <div style="position:absolute;bottom:0.8em;font-size:0.33em;letter-spacing:0.1em;color:rgba(220,185,110,0.2);z-index:2">
      © 新生教會主日學 2026
    </div>
  </div>

  <!-- ══ FINAL STRIKE ══ -->
  <div v-else-if="screen === 'finalStrike'" class="flex flex-col items-center justify-center h-full w-full" style="padding:3em">
    <div style="font-size:0.52em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(184,144,64,0.5);margin-bottom:0.7em">Final Strike</div>
    <div class="font-display text-cream" style="font-size:2.2em;margin-bottom:0.15em">鬼王無慘血量歸零</div>
    <div class="text-muted" style="font-size:0.7em;margin-bottom:2.5em">全員準備好──同時揮刀</div>
    <div style="border-top:1px solid rgba(194,59,43,0.4);border-bottom:1px solid rgba(194,59,43,0.4);padding:0.8em 3.5em;margin-bottom:2.5em">
      <div class="font-display slash-text" style="font-size:4.5em;letter-spacing:0.22em">鬼殺隊――斬！</div>
    </div>
    <button @click="screen='victory'" class="btn btn-red" style="font-size:0.7em;padding:0.55em 2.4em;letter-spacing:0.12em">完成斬擊</button>
  </div>

  <!-- ══ VICTORY ══ -->
  <div v-else-if="screen === 'victory'" class="flex h-full w-full" style="padding:3em 5em;gap:4.5em;align-items:center">
    <div style="flex:0 0 auto">
      <div style="font-size:0.52em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(184,144,64,0.5);margin-bottom:0.4em">Victory</div>
      <div class="font-display text-accent" style="font-size:4.8em;line-height:0.88;margin-bottom:0.2em">鬼王<br>消滅</div>
      <div style="width:2.5em;height:1.5px;background:linear-gradient(to right,#b89040,transparent);margin-top:0.6em;opacity:0.7"></div>
      <div class="text-muted" style="font-size:0.62em;margin-top:0.8em">鬼殺隊全員英勇獲勝</div>
    </div>
    <div style="flex:1;border-left:1px solid rgba(194,59,43,0.12);padding-left:2.5em">
      <div class="section-label">最終排名</div>
      <div style="display:grid;grid-template-columns:1.6em 1.8em 1fr auto auto auto;gap:0 0.6em;align-items:center;font-size:0.44em;letter-spacing:0.08em;text-transform:uppercase;color:rgba(184,144,64,0.4);padding:0 0 0.4em 0;margin-bottom:0.2em">
        <span></span><span></span><span></span>
        <span>傷害</span><span>步數</span><span style="width:2.5em;text-align:right"></span>
      </div>
      <div v-for="(team, idx) in rankedTeams" :key="team.id"
           class="flex items-center gap-3"
           style="padding:0.4em 0;border-bottom:1px solid rgba(194,59,43,0.06)">
        <span class="font-display text-dim" style="font-size:0.7em;width:1.6em;flex-shrink:0">0{{ idx+1 }}</span>
        <img :src="team.avatar"
             style="width:1.8em;height:1.8em;border-radius:50%;object-fit:cover;flex-shrink:0"
             :style="{outline:'1.5px solid '+team.color,outlineOffset:'1px'}"
             onerror="this.style.display='none'">
        <span class="text-cream" style="font-size:0.82em;font-weight:500;flex:1">{{ team.name }}</span>
        <span class="font-display" style="font-size:0.78em;width:2.2em;text-align:right" :style="{color:team.color}">{{ team.damageDealt }}</span>
        <span class="font-display" style="font-size:0.78em;width:2.2em;text-align:right;color:rgba(184,144,64,0.7)">{{ team.totalSteps||0 }}</span>
        <span style="font-size:0.44em;letter-spacing:0.08em;width:3.5em;text-align:right">
          <span v-if="idx===0" style="color:rgba(184,144,64,0.7)">最強</span>
          <span v-if="team.id===mostTraveledId" style="color:rgba(90,184,138,0.8)">最遠</span>
        </span>
      </div>
    </div>
  </div>

  <!-- ══ BOSS VICTORY ══ -->
  <div v-else-if="screen === 'bossVictory'" class="flex flex-col items-center justify-center h-full w-full">
    <div style="font-size:0.52em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(194,59,43,0.4);margin-bottom:0.7em">Game Over</div>
    <div class="font-display text-accent" style="font-size:5.2em;line-height:0.88;margin-bottom:0.2em">鬼王<br>勝利</div>
    <div class="text-muted" style="font-size:0.68em;margin-top:0.6em">所有隊伍已被消滅</div>
  </div>

  <!-- ══ MAIN GAME ══ -->
  <template v-else-if="screen === 'game'">

    <!-- TOP BAR -->
    <div class="flex items-center gap-3 flex-shrink-0"
         style="height:7%;min-height:0;padding:0 1.2em;background:#0d0b11;border-bottom:1px solid rgba(194,59,43,0.1)">
      <div class="font-display text-cream" style="font-size:1.1em;letter-spacing:0.05em;flex-shrink:0">擊殺鬼王大富翁</div>
      <!-- ticker -->
      <div class="ticker-wrap" style="flex:1">
        <div class="ticker-inner">
          KILL THE DEMON KING &nbsp;⸺&nbsp; 擊殺鬼王 &nbsp;⸺&nbsp; SLAYERS UNITE &nbsp;⸺&nbsp; 鬼殺隊集結 &nbsp;⸺&nbsp; ROUND {{ globalRound }} &nbsp;⸺&nbsp; DEMON HP {{ ghostKingHP }} &nbsp;⸺&nbsp; KILL THE DEMON KING &nbsp;⸺&nbsp; 擊殺鬼王 &nbsp;⸺&nbsp; SLAYERS UNITE &nbsp;⸺&nbsp; 鬼殺隊集結 &nbsp;⸺&nbsp; ROUND {{ globalRound }} &nbsp;⸺&nbsp; DEMON HP {{ ghostKingHP }} &nbsp;⸺&nbsp;
        </div>
      </div>
      <div class="text-muted" style="font-size:0.5em;letter-spacing:0.14em;text-transform:uppercase;flex-shrink:0">
        RND <span class="font-display text-cream" style="font-size:1.35em">{{ globalRound }}</span>
      </div>
      <span v-if="autoSaveMsg" style="font-size:0.42em;color:rgba(184,144,64,0.5);letter-spacing:0.08em;flex-shrink:0">{{ autoSaveMsg }}</span>
      <div class="flex gap-2" style="flex-shrink:0">
        <button @click="undoLastAction" :disabled="!lastSnapshot" class="btn btn-ghost" style="font-size:0.52em;padding:0.3em 0.8em">↩ 上一步</button>
        <button @click="switchLap" class="btn btn-ghost" :style="currentLap===2?'font-size:0.52em;padding:0.3em 0.8em;border-color:rgba(90,184,138,0.5);color:#5ab88a':'font-size:0.52em;padding:0.3em 0.8em'">{{ currentLap===1?'切換第二圈':'● 第二圈' }}</button>
        <button @click="showSaveModal=true" class="btn btn-ghost" style="font-size:0.52em;padding:0.3em 0.8em">存檔</button>
      </div>
    </div>

    <!-- 3-COLUMN -->
    <div class="flex flex-1 overflow-hidden">

      <!-- ── LEFT ── -->
      <div class="flex flex-col"
           style="width:22%;background:#0d0b11;border-right:1px solid rgba(194,59,43,0.1)">

        <!-- Boss row -->
        <div class="flex items-center flex-shrink-0"
             style="padding:0.65em 0.8em;gap:0.65em;transition:background 0.2s;border-bottom:1px solid rgba(194,59,43,0.12)"
             :style="{background:currentTurnType==='boss'?'rgba(194,59,43,0.07)':'transparent',
                      borderLeft:currentTurnType==='boss'?'2.5px solid #c23b2b':'2.5px solid transparent'}">
          <img :src="MUZAN_AVATAR"
               style="width:2.6em;height:2.6em;border-radius:50%;object-fit:cover;flex-shrink:0;opacity:0.9;outline:1.5px solid #c23b2b;outline-offset:2px"
               onerror="this.style.display='none'">
          <div style="flex:1;min-width:0">
            <div style="font-size:0.76em;font-weight:700;color:#e8908a">鬼王無慘</div>
            <div style="height:2px;background:rgba(194,59,43,0.15);margin-top:0.35em;border-radius:1px">
              <div class="hp-bar-inner h-full" style="border-radius:1px"
                   :style="{width:Math.max(0,ghostKingHP/60*100)+'%',background:'#c23b2b'}"></div>
            </div>
            <div style="margin-top:0.2em;display:flex;gap:0.4em">
              <span v-if="bossStatus.nextAttackMultiplier>1" style="font-size:0.42em;color:rgba(194,59,43,0.6)">夜晚 ×{{ bossStatus.nextAttackMultiplier }}</span>
              <span v-if="bossStatus.isBossTurnSkip"   style="font-size:0.42em;color:rgba(184,144,64,0.5)">白天跳過</span>
              <span v-if="bossStatus.sealedMovement"   style="font-size:0.42em;color:rgba(90,184,138,0.6)">封印</span>
              <span v-if="bossStatus.targetHighest"    style="font-size:0.42em;color:rgba(180,80,200,0.7)">黑死牟</span>
            </div>
          </div>
          <div style="flex-shrink:0;text-align:right">
            <div class="font-display text-accent" style="font-size:1.1em;line-height:1">{{ ghostKingHP }}</div>
            <div style="font-size:0.34em;color:rgba(194,59,43,0.38);letter-spacing:0.08em;margin-top:0.1em">HP</div>
          </div>
        </div>

        <!-- Team rows -->
        <div class="flex flex-col overflow-y-auto log-container" style="flex:1">
          <div v-for="(team,idx) in teams" :key="team.id"
               :class="[flashingTeams[team.id]?'team-row-hit':'']"
               style="display:flex;align-items:center;gap:0.65em;padding:0.6em 0.8em;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.18s,border-left-color 0.18s"
               :style="{
                 background: currentTurnType==='player'&&teams[currentTeamIndex]&&teams[currentTeamIndex].id===team.id&&team.hp>0 ? 'rgba(255,255,255,0.055)' : 'transparent',
                 borderLeft: currentTurnType==='player'&&teams[currentTeamIndex]&&teams[currentTeamIndex].id===team.id&&team.hp>0 ? '2.5px solid '+team.color : '2.5px solid transparent',
                 opacity: team.hp<=0 ? 0.32 : 1
               }">
            <img :src="team.avatar"
                 :class="{
                   'avatar-glow-shield': team.status.shieldActive && !team.status.doubleDamage,
                   'avatar-glow-double': team.status.doubleDamage && !team.status.shieldActive,
                   'avatar-glow-both':   team.status.shieldActive && team.status.doubleDamage
                 }"
                 style="width:2.6em;height:2.6em;border-radius:50%;object-fit:cover;flex-shrink:0;display:block"
                 :style="{outline:'1.5px solid '+(team.hp>0?team.color:'#2a1a14'),outlineOffset:'2px'}"
                 onerror="this.style.display='none'">
            <div style="flex:1;min-width:0">
              <div style="font-size:0.76em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                   :style="{color:team.hp>0?'#e0d4c0':'#5a4a40'}">{{ team.name }}</div>
              <div style="display:flex;align-items:center;gap:0.35em;margin-top:0.12em">
                <span v-if="team.status.shieldActive"  style="font-size:0.42em;color:#5090c8">盾</span>
                <span v-if="team.status.doubleDamage"  style="font-size:0.42em;color:#c23b2b">×2</span>
                <span v-if="team.status.breathEnhanced" style="font-size:0.42em;color:#5ab88a">呼</span>
                <span v-if="team.status.revengeBlade"   style="font-size:0.42em;color:#e8a84a">刃</span>
                <span style="font-size:0.42em;color:rgba(184,144,64,0.38)">傷 {{ team.damageDealt }}</span>
              </div>
            </div>
            <div style="flex-shrink:0;text-align:right">
              <div class="font-display" style="font-size:1.1em;line-height:1"
                   :style="{color:team.hp>0?team.color:'#3a2a24'}">{{ team.hp }}</div>
              <div style="font-size:0.34em;color:rgba(224,212,192,0.2);letter-spacing:0.08em;margin-top:0.1em">HP</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── CENTER ── -->
      <div class="flex flex-col items-center justify-center"
           style="width:56%;padding:0.4em;background:#080502">
        <div style="width:100%;aspect-ratio:1/1;max-height:100%;position:relative">
          <div class="board-grid" style="height:100%;width:100%">

            <template v-for="row in 5" :key="'r'+row">
              <template v-for="col in 5" :key="'r'+row+'c'+col">

                <!-- control panel -->
                <div v-if="row===2&&col===2" class="control-panel">

                  <div class="text-center" style="margin-bottom:0.5em;position:relative;z-index:1">
                    <div class="text-dim" style="font-size:0.42em;letter-spacing:0.17em;text-transform:uppercase;margin-bottom:0.22em">現在輪到</div>
                    <div v-if="currentTurnType==='player'&&teams[currentTeamIndex]"
                         class="font-display" style="font-size:1.45em;line-height:1"
                         :style="{color:teams[currentTeamIndex].color}">
                      {{ teams[currentTeamIndex].name }}
                    </div>
                    <div v-else-if="currentTurnType==='boss'" class="font-display text-accent" style="font-size:1.45em;line-height:1">鬼王無慘</div>
                    <div class="text-dim" style="margin-top:0.3em;font-size:0.46em;letter-spacing:0.12em;text-transform:uppercase;opacity:0.7">
                      {{ phaseLabel }}
                    </div>
                    <div v-if="nextTurnInfo" class="text-dim"
                         style="margin-top:0.4em;padding-top:0.3em;border-top:1px solid rgba(194,59,43,0.08);font-size:0.46em">
                      下一位 <span style="font-weight:500" :style="{color:nextTurnInfo.color}">{{ nextTurnInfo.name }}</span>
                    </div>
                  </div>

                  <!-- SETTLE -->
                  <div v-if="currentPhase==='settle'&&currentTurnType==='player'&&teams[currentTeamIndex]&&teams[currentTeamIndex].pendingTask"
                       style="width:100%;display:flex;flex-direction:column;gap:0.3em;position:relative;z-index:1">
                    <div class="text-center font-bold" style="font-size:0.58em;margin-bottom:0.1em;color:#c8a040">⏳ 結算上回合任務</div>
                    <div class="text-center" style="font-size:0.6em;margin-bottom:0.25em;color:#9a8a78">{{ teams[currentTeamIndex].pendingTask.name }}</div>
                    <template v-if="!taskSuccessRolling">
                      <button @click="settleTaskSuccess" class="btn"
                              style="font-size:0.7em;padding:0.45em;width:100%;border-color:rgba(90,184,138,0.3);color:#5ab88a">任務成功</button>
                      <button @click="settleTaskFail" class="btn btn-red"
                              style="font-size:0.7em;padding:0.45em;width:100%">任務失敗</button>
                    </template>
                    <template v-else>
                      <div class="text-center" style="font-size:0.6em;margin-bottom:0.2em;color:#5ab88a">骰骰子決定傷害</div>
                      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.2em">
                        <button v-for="n in 6" :key="n" @click="applyTaskDamage(n)"
                                class="dice-btn"
                                style="background:rgba(90,184,138,0.08);color:#5ab88a;border-color:rgba(90,184,138,0.25)">
                          {{ n }}
                        </button>
                      </div>
                    </template>
                  </div>

                  <!-- ROLL -->
                  <div v-else-if="currentPhase==='roll'&&currentTurnType==='player'"
                       style="width:100%;position:relative;z-index:1">
                    <div class="text-center" style="font-size:0.62em;margin-bottom:0.3em;color:#6a5a50">選擇骰子點數</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.2em">
                      <button v-for="n in 6" :key="n" @click="playerRoll(n)"
                              :disabled="isAnimating"
                              class="dice-btn dice-btn-player">{{ n }}</button>
                    </div>
                  </div>

                  <!-- ACTION: task -->
                  <div v-else-if="currentPhase==='action'&&currentTurnType==='player'&&lapSquare&&(lapSquare.type==='task'||lapSquare.type==='start')"
                       style="width:100%;display:flex;flex-direction:column;gap:0.3em;position:relative;z-index:1">
                    <div v-if="!showCrowDesc" class="text-center"
                         @click="showCrowDesc=true"
                         style="font-size:0.58em;margin-bottom:0.2em;color:rgba(194,59,43,0.6);cursor:pointer;letter-spacing:0.04em">
                      查看任務說明 ▾
                    </div>
                    <div v-else class="text-center" style="font-size:0.6em;margin-bottom:0.25em;color:#9a8a78">{{ lapSquare.desc }}</div>
                    <button @click="startTask" class="btn"
                            style="font-size:0.72em;padding:0.45em;width:100%;border-color:rgba(184,144,64,0.3);color:#b89040">出發執行任務</button>
                  </div>

                  <!-- ACTION: card -->
                  <div v-else-if="currentPhase==='action'&&currentTurnType==='player'&&currentSquare&&currentSquare.type==='card'"
                       style="width:100%;position:relative;z-index:1">
                    <div v-if="cardChoices.length===0">
                      <button @click="prepareCards" class="btn w-full"
                              style="font-size:0.72em;padding:0.5em;border-color:rgba(152,120,200,0.3);color:#9878c8">翻牌</button>
                    </div>
                    <div v-else-if="flippedCardIndex===null">
                      <div class="text-center" style="font-size:0.58em;margin-bottom:0.3em;color:#9878c8">選一張翻開</div>
                      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.25em">
                        <div v-for="(c,i) in cardChoices" :key="i" @click="startFlipCard(i)"
                             :class="{'card-flipping-anim': flippingCardIndex===i}"
                             style="aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#0e0b12;border:1px solid rgba(194,59,43,0.12);font-size:1.1em;transition:border-color 0.12s,background 0.12s"
                             onmouseover="this.style.background='#1a1018';this.style.borderColor='rgba(194,59,43,0.3)'"
                             onmouseout="this.style.background='#0e0b12';this.style.borderColor='rgba(194,59,43,0.12)'">?</div>
                      </div>
                    </div>
                    <div v-else style="text-align:center">
                      <div :style="cardChoices[flippedCardIndex].isChance
                             ? 'font-size:0.52em;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#5ab88a'
                             : 'font-size:0.52em;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9878c8'">
                        {{ cardChoices[flippedCardIndex].isChance ? '✨ 機會卡' : '⚠️ 命運卡' }}

function nowStr() {

  computed: {

        return null;
      }

    lapSquare: function() {
      var sq=this.currentSquare; if (!sq) return null;

    phaseLabel: function() {

    },
    rankedTeams: function() {
      return this.teams.slice().sort(function(a,b){return b.damageDealt-a.damageDealt;});
    },
    mostTraveledId: function() {
      var max=-1; var id=-1;
      for (var i=0;i<this.teams.length;i++) if (this.teams[i].totalSteps>max){max=this.teams[i].totalSteps;id=this.teams[i].id;}

    },
    bossDisplayPos: function() {

  },

  methods: {
    saveSnapshot: function() {
      this.lastSnapshot={

        bossTargets:this.bossTargets.slice(), cardChoices:this.cardChoices.slice(),
        flippedCardIndex:this.flippedCardIndex, announcement:Object.assign({},this.announcement),
        teams:this.teams.map(function(t){return{id:t.id,position:t.position,hp:t.hp,damageDealt:t.damageDealt,totalSteps:t.totalSteps||0,status:{shieldActive:t.status.shieldActive,doubleDamage:t.status.doubleDamage,breathEnhanced:t.status.breathEnhanced,revengeBlade:t.status.revengeBlade},pendingTask:t.pendingTask?{name:t.pendingTask.name,damage:t.pendingTask.damage}:null};}),
      };
    },
    undoLastAction: function() {
      if (!this.lastSnapshot) return;

      this.ghostKingHP=s.ghostKingHP; this.bossPosition=s.bossPosition;

      this.bossStatus={nextAttackMultiplier:s.bossStatus.nextAttackMultiplier,isBossTurnSkip:s.bossStatus.isBossTurnSkip,sealedMovement:s.bossStatus.sealedMovement,targetHighest:s.bossStatus.targetHighest};
      this.currentLap=s.currentLap||1;
      this.bossTargets=s.bossTargets.slice(); this.cardChoices=s.cardChoices.slice();
      this.flippedCardIndex=s.flippedCardIndex; this.announcement=Object.assign({},s.announcement);
      var self=this;
      s.teams.forEach(function(saved){
        var team=self.teams.find(function(t){return t.id===saved.id;});
        if (team){team.position=saved.position;team.hp=saved.hp;team.damageDealt=saved.damageDealt;team.totalSteps=saved.totalSteps||0;team.status.shieldActive=saved.status.shieldActive;team.status.doubleDamage=saved.status.doubleDamage;team.status.breathEnhanced=saved.status.breathEnhanced||false;team.status.revengeBlade=saved.status.revengeBlade||false;team.pendingTask=saved.pendingTask||null;}

    autoSave: function() {
      try {
        localStorage.setItem('ds_monopoly_save', JSON.stringify({
          screen:'game',

          teams:this.teams.map(function(t){return{id:t.id,position:t.position,hp:t.hp,damageDealt:t.damageDealt,totalSteps:t.totalSteps||0,status:{shieldActive:t.status.shieldActive,doubleDamage:t.status.doubleDamage,breathEnhanced:t.status.breathEnhanced,revengeBlade:t.status.revengeBlade},pendingTask:t.pendingTask?{name:t.pendingTask.name,damage:t.pendingTask.damage}:null};}),
        }));

    },

    restoreAutoSave: function() {

        var data=JSON.parse(localStorage.getItem('ds_monopoly_save'));

          var def=null; for(var i=0;i<defaults.length;i++)if(defaults[i].id===saved.id){def=defaults[i];break;}
          return{id:def.id,name:def.name,color:def.color,avatar:def.avatar,position:saved.position,hp:saved.hp,damageDealt:saved.damageDealt,totalSteps:saved.totalSteps||0,status:{shieldActive:saved.status.shieldActive,doubleDamage:saved.status.doubleDamage,breathEnhanced:saved.status.breathEnhanced||false,revengeBlade:saved.status.revengeBlade||false},pendingTask:saved.pendingTask||null};

    logEntryClass: function(type) {
      return {damage:'text-red-400',success:'text-green-400',card:'text-yellow-400',system:'text-slate-400',fail:'text-orange-400',heal:'text-teal-400',shield:'text-cyan-400'}[type]||'text-slate-400';
    },
    teamRowClass: function(team) {
      if (team.hp<=0) return 'opacity-40';
      var a=this.teams[this.currentTeamIndex];
      if (this.currentTurnType==='player'&&a&&a.id===team.id) return 'ring-1 ring-yellow-400/20';
      return '';
    },
    squareAt: function(row,col) {
      var id=BOARD_LAYOUT[row+'-'+col]; if (!id) return null;
      for (var i=0;i<SQUARES.length;i++) if (SQUARES[i].id===id) return SQUARES[i];
      return null;
    },
    cellClass: function(row,col) {
      var sq=this.squareAt(row,col); if (!sq) return '';
      if (sq.type==='start') return 'cell-trace-red';
      if (sq.type==='card')  return 'cell-trace-purple';
      return 'cell-trace';
    },
    refreshAnnouncement: function() {
      var sq=this.lapSquare;
      if (sq){this.announcement.title='格 '+sq.id+'：'+sq.name;this.announcement.desc=sq.desc;}
      else if (this.currentTurnType==='boss'){this.announcement.title='鬼王無慘';this.announcement.desc='鬼王行動中...';}
    },
    clearAnnouncementResult: function() {
      this.announcement.cardType='';this.announcement.cardName='';this.announcement.cardEffect='';this.announcement.result='';this.announcement.resultColor='';
    },
    movePosition: function(pos,steps) { return GameLogic.movePosition(pos,steps); },

    teamDisplayPos: function(team) {
      return this.animatingPositions[team.id] !== undefined
        ? this.animatingPositions[team.id]
        : team.position;
    },

    playerRoll: function(n) {
      this.saveSnapshot();
      var team = this.teams[this.currentTeamIndex];
      var startPos = team.position;
      var self = this;
      var step = 0;
      this.isAnimating = true;

      function moveStep() {
        step++;
        var midPos = self.movePosition(startPos, step);
        // update reactive display position
        var ap = {}; for (var k in self.animatingPositions) ap[k] = self.animatingPositions[k];
        ap[team.id] = midPos;
        self.animatingPositions = ap;
        // hop animation class pulse
        self.hoppingTeam = team.id;
        setTimeout(function(){ self.hoppingTeam = null; }, 220);

        if (step < n) {
          setTimeout(moveStep, 280);
        } else {
          // animation done — commit final state
          setTimeout(function() {
            var wrapped = (startPos - 1 + n) >= 16;
            team.position = midPos;
            team.totalSteps = (team.totalSteps||0) + n;
            self.animatingPositions = {};
            self.isAnimating = false;
            if (wrapped) {
              if (team.status.shieldActive) { self.addLog('shield', team.name + ' 繞完一圈！已有護盾，護盾保留。'); }
              else { team.status.shieldActive = true; self.addLog('shield', team.name + ' 繞完一圈！自動獲得護盾！'); }
            }
            var sq = null;
            for (var i = 0; i < SQUARES.length; i++) if (SQUARES[i].id === midPos) { sq = SQUARES[i]; break; }
            var sqName = sq ? (self.currentLap===2&&sq.name2 ? sq.name2 : sq.name) : '';
            self.addLog('system', team.name + ' 擲出 ' + n + '，移動到格 ' + midPos + '「' + sqName + '」');
            self.currentPhase = 'action';
            self.clearAnnouncementResult();
            self.refreshAnnouncement();
            if (sq && (sq.type === 'task' || sq.type === 'start')) { self.crowMission = sq; self.showCrowModal = true; }
          }, 280);
        }
      }
      setTimeout(moveStep, 80);
    },
    showTurnCard: function(name, color, isBoss) {
      this.turnTransitionName=name; this.turnTransitionColor=color; this.turnTransitionIsBoss=isBoss;
      this.showTurnTransition=true;
      var self=this; if(self._turnTimer) clearTimeout(self._turnTimer);
      self._turnTimer=setTimeout(function(){self.showTurnTransition=false;},1400);
    },
    startFlipCard: function(index) {
      if(this.flippingCardIndex!==null) return;
      this.flippingCardIndex=index;
      var self=this;
      setTimeout(function(){self.flippingCardIndex=null; self.flipCard(index);},420);
    },
    closeCrowModal: function() { this.showCrowModal=false; this.showCrowDesc=false; },
    closeCardModal: function() {
      this.showCardModal=false;
      if(this.pendingCardChoice){
        var team=this.teams[this.currentTeamIndex];
        this.applyCard(this.pendingCardChoice.card,this.pendingCardChoice.isChance,team);
        this.pendingCardChoice=null;
        this.currentPhase='next';
      }
    },

    triggerDamageEffect: function(teamId, damage) {
      var team=null;
      for (var i=0;i<this.teams.length;i++) if(this.teams[i].id===teamId){team=this.teams[i];break;}
      if (!team) return;
      var sqId=this.teamDisplayPos(team);
      // flash cell
      var nf=Object.assign({},this.flashingCells); nf[sqId]=true; this.flashingCells=nf;
      // flash team row (E)
      var nt=Object.assign({},this.flashingTeams); nt[teamId]=true; this.flashingTeams=nt;
      // floating number
      var entry={id:Date.now()+Math.random(),squareId:sqId,damage:damage};
      this.floatingDamages=this.floatingDamages.concat([entry]);
      var self=this;
      setTimeout(function(){var nf2=Object.assign({},self.flashingCells);delete nf2[sqId];self.flashingCells=nf2;},650);
      setTimeout(function(){var nt2=Object.assign({},self.flashingTeams);delete nt2[teamId];self.flashingTeams=nt2;},650);
      setTimeout(function(){self.floatingDamages=self.floatingDamages.filter(function(d){return d.id!==entry.id;});},950);
    },

    startTask: function() {
      this.saveSnapshot();
      var team=this.teams[this.currentTeamIndex]; var sq=this.lapSquare;
      team.pendingTask={name:sq.name,damage:sq.damage};
      this.addLog('system',team.name+' 出發執行任務：「'+sq.name+'」（結果下輪揭曉）');
      this.announcement.result='🏃 執行中，下輪結算'; this.announcement.resultColor='text-yellow-400';
      this.currentPhase='next';
    },
    settleTaskSuccess: function() {
      this.taskSuccessRolling = true;
    },
    applyTaskDamage: function(n) {
      this.saveSnapshot();
      var team=this.teams[this.currentTeamIndex]; var task=team.pendingTask;
      var result=GameLogic.calcTaskDamage(n,team.status,team.hp);
      var dmg=result.damage; var modNote=result.notes.join(' ');
      team.status.breathEnhanced=result.status.breathEnhanced;
      team.status.revengeBlade=result.status.revengeBlade;
      team.status.doubleDamage=result.status.doubleDamage;
      team.damageDealt+=dmg; this.ghostKingHP=Math.max(0,this.ghostKingHP-dmg);
      this.addLog('success',team.name+' 任務「'+task.name+'」成功！骰出 '+n+(modNote?'（'+modNote.trim()+'）':'')+'，造成 '+dmg+' 傷害。鬼王剩 '+this.ghostKingHP+' HP');
      this.announcement.result='✅ 任務成功！造成 '+dmg+' 傷害'+(modNote?' （'+modNote.trim()+'）':''); this.announcement.resultColor='text-green-400';
      team.pendingTask=null; this.currentPhase='roll'; this.taskSuccessRolling=false;
      if (this.ghostKingHP<=0) this.screen='finalStrike';
    },
    settleTaskFail: function() {
      this.saveSnapshot();
      var team=this.teams[this.currentTeamIndex]; var task=team.pendingTask;
      this.addLog('fail',team.name+' 任務「'+task.name+'」失敗。');
      this.announcement.result='❌ 任務失敗'; this.announcement.resultColor='text-orange-400';
      team.pendingTask=null; this.currentPhase='roll'; this.taskSuccessRolling=false;
    },
    prepareCards: function() {
      var choices=[];
      for (var i=0;i<4;i++){var isChance=Math.random()<0.5;var pool=isChance?CHANCE_CARDS:FATE_CARDS;choices.push({isChance:isChance,card:pool[Math.floor(Math.random()*pool.length)]});}
      this.cardChoices=choices; this.flippedCardIndex=null;
      this.announcement.title='選一張牌翻開'; this.announcement.desc='';
    },
    flipCard: function(index) {
      this.saveSnapshot(); this.flippedCardIndex=index;
      var choice=this.cardChoices[index]; var team=this.teams[this.currentTeamIndex];
      var cardType=choice.isChance?'機會卡':'命運卡';
      this.announcement.cardType=cardType; this.announcement.cardName=choice.card.name;
      this.announcement.cardEffect=choice.card.effect; this.announcement.result='';
      this.addLog('card',team.name+' 抽到'+cardType+'：'+choice.card.name);
      // 先讓大家看到牌的內容，關掉 modal 後才套用效果
      this.pendingCardChoice={card:choice.card,isChance:choice.isChance};
      this.cardModalData={isChance:choice.isChance,type:cardType,name:choice.card.name,effect:choice.card.effect};
      this.showCardModal=true;
    },
    applyCard: function(card,isChance,team) {
      if (isChance) {
        if (card.id==='revive'){var dead=this.teams.filter(function(t){return t.hp<=0;});if(dead.length===0){this.addLog('system','死者甦醒：目前沒有陣亡隊伍，無效果。');}else if(dead.length===1){dead[0].hp=5;this.addLog('heal','死者甦醒：'+dead[0].name+' 復活，HP 恢復為 5！');}else{this.deadTeams=dead;this.showReviveModal=true;}}
        else if (card.id==='heal'){var prev=team.hp;team.hp=GameLogic.applyHeal(team.hp,5,10);this.addLog('heal','生命藥水：'+team.name+' 回復 '+(team.hp-prev)+' HP（現在 '+team.hp+' HP）');}
        else if (card.id==='shield'){team.status.shieldActive=true;this.addLog('shield','防護盾：'+team.name+' 獲得護盾標記！');}
        else if (card.id==='double'){team.status.doubleDamage=true;this.addLog('system','強化攻擊：'+team.name+' 獲得雙倍攻擊標記！');}
        else if (card.id==='breath'){team.status.breathEnhanced=true;this.addLog('system','呼吸法強化：'+team.name+' 下一次任務成功傷害固定為 6！');}
        else if (card.id==='revenge'){team.status.revengeBlade=true;this.addLog('system','復仇之刃：'+team.name+' 獲得標記，HP ≤ 3 時任務傷害 ×3！');}
        else if (card.id==='seal'){this.bossStatus.sealedMovement=true;this.addLog('system','鬼王封印：鬼王下一回合移動步數固定為 1！');}
        else if (card.id==='pillars'){
          this.addLog('heal','柱的支持：所有存活隊伍各回復 2 HP！');
          var pillarsResults=GameLogic.applyPillars(this.teams);
          for (var i=0;i<pillarsResults.length;i++){var pr=pillarsResults[i];var t=null;for(var j=0;j<this.teams.length;j++)if(this.teams[j].id===pr.teamId){t=this.teams[j];break;}if(!t)continue;var prev=t.hp;t.hp=pr.newHP;this.addLog('heal',t.name+' 回復 '+(t.hp-prev)+' HP（現在 '+t.hp+'）');}
        }
      } else {
        if (card.id==='night'){this.bossStatus.nextAttackMultiplier=2;this.addLog('system','夜晚來臨：鬼王下一次攻擊傷害 ×2！');}
        else if (card.id==='day'){this.bossStatus.isBossTurnSkip=true;this.addLog('system','白天來了：鬼王下一回合將跳過行動！');}
        else if (card.id==='blast'){
          this.addLog('damage','鬼放大招：無慘對所有存活隊伍造成 3 點傷害！');
          var blastResults=GameLogic.applyBlast(this.teams);
          for (var i=0;i<blastResults.length;i++){var br=blastResults[i];var t=null;for(var j=0;j<this.teams.length;j++)if(this.teams[j].id===br.teamId){t=this.teams[j];break;}if(!t)continue;if(br.shieldConsumed){t.status.shieldActive=false;this.addLog('shield',t.name+' 護盾抵擋了大招！');}else{t.hp=br.newHP;this.addLog('damage',t.name+' 受到 3 點傷害，剩餘 '+t.hp+' HP'+(t.hp<=0?'（已陣亡！）':''));this.triggerDamageEffect(t.id,3);}}
          this.checkAllDead();
        } else if (card.id==='peace'){this.addLog('system','真是個平安的一天：無事發生。');}
        else if (card.id==='regen'){var prev=this.ghostKingHP;this.ghostKingHP=GameLogic.applyRegen(this.ghostKingHP,5,60);this.addLog('system','無慘再生：鬼王回復 '+(this.ghostKingHP-prev)+' HP（現在 '+this.ghostKingHP+'）！');}
        else if (card.id==='kokushibo'){this.bossStatus.targetHighest=true;this.addLog('system','黑死牟降臨：鬼王本回合攻擊目標改為血量最多的隊伍！');}
      }
    },
    switchLap: function() {
      if (this.currentLap===1){this.currentLap=2;this.addLog('system','【第二圈開始】任務內容全面更新！');}
      else{this.currentLap=1;this.addLog('system','【切回第一圈】');}
    },
    reviveTeam: function(teamId) {
      for (var i=0;i<this.teams.length;i++) if(this.teams[i].id===teamId){this.teams[i].hp=5;this.addLog('heal','死者甦醒：'+this.teams[i].name+' 復活，HP 恢復為 5！');break;}
      this.showReviveModal=false; this.deadTeams=[];
    },
    nextPlayerTurn: function() {
      this.saveSnapshot(); this.cardChoices=[]; this.flippedCardIndex=null;
      var nextIdx=-1;
      for (var i=this.currentTeamIndex+1;i<6;i++) if(this.teams[i].hp>0){nextIdx=i;break;}
      if (nextIdx!==-1){
        this.currentTeamIndex=nextIdx; this.currentTurnType='player'; this.clearAnnouncementResult();
        var nextTeam=this.teams[nextIdx];
        if(nextTeam.pendingTask){this.currentPhase='settle';this.announcement.title='⏳ 結算上回合任務';this.announcement.desc=nextTeam.name+' 的任務：'+nextTeam.pendingTask.name;}
        else{this.currentPhase='roll';this.announcement.title='';this.announcement.desc='';this.refreshAnnouncement();}
        this.showTurnCard(nextTeam.name, nextTeam.color, false);
      } else {
        this.currentTurnType='boss'; this.announcement.title='鬼王無慘回合'; this.announcement.desc=''; this.clearAnnouncementResult();
        if(this.bossStatus.isBossTurnSkip){this.bossStatus.isBossTurnSkip=false;this.addLog('system','白天來了：鬼王跳過本回合行動！');this.announcement.result='☀️ 白天來了：鬼王跳過！';this.announcement.resultColor='text-yellow-400';this.currentPhase='boss-next';}
        else{this.currentPhase='boss-roll';}
        this.showTurnCard('鬼王無慘', '#c23b2b', true);
      }
    },
    calcBossTargets: function() {
      var targets=GameLogic.calcBossTargets(this.bossPosition,this.bossStatus.targetHighest,this.teams);
      this.bossStatus.targetHighest=false;
      return targets;
    },
    bossRoll: function(n) {
      this.saveSnapshot();
      if(this.bossStatus.sealedMovement){n=1;this.bossStatus.sealedMovement=false;this.addLog('system','鬼王封印：移動步數被強制為 1！');}
      var startPos=this.bossPosition; var step=0; var self=this;
      this.isAnimating=true;
      function moveBossStep(){
        step++;
        var midPos=self.movePosition(startPos,step);
        self.bossAnimatingPosition=midPos;
        self.hoppingBoss=true;
        setTimeout(function(){self.hoppingBoss=false;},220);
        if(step<n){
          setTimeout(moveBossStep,280);
        } else {
          setTimeout(function(){
            self.bossPosition=midPos; self.bossAnimatingPosition=null; self.isAnimating=false;
            self.addLog('system','鬼王無慘擲出 '+n+'，移動到格 '+midPos);
            self.bossTargets=self.calcBossTargets(); self.currentPhase='boss-attack';
            self.announcement.title='鬼王在格 '+midPos;
            self.announcement.desc='攻擊目標：'+self.bossTargets.map(function(t){return t.name;}).join(' 和 ');
            self.announcement.result='';
          },280);
        }
      }
      setTimeout(moveBossStep,80);
    },
    bossAttack: function(n) {
      this.saveSnapshot();
      var mult=this.bossStatus.nextAttackMultiplier; var baseDmg=n*mult; this.bossStatus.nextAttackMultiplier=1;
      this.addLog('damage','鬼王無慘發動攻擊！骰子 '+n+(mult>1?' ×'+mult:'')+' = '+baseDmg+' 傷害');
      var self=this;
      var currentTargets=this.bossTargets.map(function(ref){return self.teams.find(function(t){return t.id===ref.id;});}).filter(function(t){return t&&t.hp>0;});
      var attackResults=GameLogic.applyBossAttack(currentTargets,baseDmg);
      for (var i=0;i<attackResults.length;i++){
        var r=attackResults[i]; var team=null;
        for (var j=0;j<this.teams.length;j++) if(this.teams[j].id===r.teamId){team=this.teams[j];break;}
        if(!team) continue;
        if(r.shieldConsumed){team.status.shieldActive=false;this.addLog('shield',team.name+' 的護盾擋下了攻擊！');}
        else{team.hp=r.newHP;this.addLog('damage',team.name+' 受到 '+baseDmg+' 點傷害，剩餘 '+team.hp+' HP'+(team.hp<=0?'（已陣亡！）':''));this.triggerDamageEffect(team.id,baseDmg);}
      }
      this.announcement.result='💥 鬼王造成 '+baseDmg+' 傷害！'; this.announcement.resultColor='text-red-400';
      this.currentPhase='boss-next'; this.checkAllDead();
    },
    endBossTurn: function() {
      this.saveSnapshot(); this.globalRound++;
      var firstIdx=-1;
      for (var i=0;i<this.teams.length;i++) if(this.teams[i].hp>0){firstIdx=i;break;}
      if(firstIdx===-1){this.screen='bossVictory';return;}
      this.currentTeamIndex=firstIdx; this.currentTurnType='player'; this.bossTargets=[];
      this.addLog('system','第 '+this.globalRound+' 輪開始！'); this.clearAnnouncementResult();
      var firstTeam=this.teams[firstIdx];
      if(firstTeam.pendingTask){this.currentPhase='settle';this.announcement.title='⏳ 結算上回合任務';this.announcement.desc=firstTeam.name+' 的任務：'+firstTeam.pendingTask.name;}
      else{this.currentPhase='roll';this.announcement.title='';this.announcement.desc='';this.refreshAnnouncement();}
      this.showTurnCard(firstTeam.name, firstTeam.color, false);
    },
    checkAllDead: function() {
      for (var i=0;i<this.teams.length;i++) if(this.teams[i].hp>0) return;
      this.screen='bossVictory';
    },
    generateSave: function() {
      var data={ghostKingHP:this.ghostKingHP,bossPosition:this.bossPosition,currentTurnType:this.currentTurnType,currentTeamIndex:this.currentTeamIndex,currentPhase:this.currentPhase,globalRound:this.globalRound,currentLap:this.currentLap,bossStatus:{nextAttackMultiplier:this.bossStatus.nextAttackMultiplier,isBossTurnSkip:this.bossStatus.isBossTurnSkip,sealedMovement:this.bossStatus.sealedMovement,targetHighest:this.bossStatus.targetHighest},teams:this.teams.map(function(t){return{id:t.id,position:t.position,hp:t.hp,damageDealt:t.damageDealt,totalSteps:t.totalSteps||0,status:{shieldActive:t.status.shieldActive,doubleDamage:t.status.doubleDamage,breathEnhanced:t.status.breathEnhanced,revengeBlade:t.status.revengeBlade},pendingTask:t.pendingTask?{name:t.pendingTask.name,damage:t.pendingTask.damage}:null};})};
      this.saveJsonStr=JSON.stringify(data,null,2);
    },
    loadSave: function() {
      try {
        var data=JSON.parse(this.saveJsonStr);
        this.ghostKingHP=data.ghostKingHP;this.bossPosition=data.bossPosition;this.currentTurnType=data.currentTurnType;this.currentTeamIndex=data.currentTeamIndex;this.currentPhase=data.currentPhase||'roll';this.globalRound=data.globalRound;
        this.bossStatus={nextAttackMultiplier:data.bossStatus.nextAttackMultiplier,isBossTurnSkip:data.bossStatus.isBossTurnSkip,sealedMovement:data.bossStatus.sealedMovement||false,targetHighest:data.bossStatus.targetHighest||false};
        this.currentLap=data.currentLap||1;
        var defaults=defaultTeams();
        this.teams=data.teams.map(function(saved){var def=null;for(var i=0;i<defaults.length;i++)if(defaults[i].id===saved.id){def=defaults[i];break;}return{id:def.id,name:def.name,color:def.color,avatar:def.avatar,position:saved.position,hp:saved.hp,damageDealt:saved.damageDealt,totalSteps:saved.totalSteps||0,status:{shieldActive:saved.status.shieldActive,doubleDamage:saved.status.doubleDamage,breathEnhanced:saved.status.breathEnhanced||false,revengeBlade:saved.status.revengeBlade||false},pendingTask:saved.pendingTask||null};});
        this.bossTargets=[];this.showSaveModal=false;this.screen='game';this.gameLog=[];
        this.addLog('system','已從存檔還原，第 '+this.globalRound+' 輪');
        this.clearAnnouncementResult();this.refreshAnnouncement();
      } catch(e) { alert('讀取失敗，JSON 格式錯誤：'+e.message); }
    },
  },
}).mount('#app');
</script>
</body>
</html>
